            <input className="input" placeholder="Preferências, alergias, etc." value={cObs} onChange={e=>setCObs(e.target.value)} style={{marginBottom:12}}/>
            <div style={{display:'flex',gap:8}}>
              <button onClick={salvarCliente} disabled={!cNome.trim()}
                style={{flex:1,background:cNome.trim()?C.red:'#e5e7eb',border:'none',borderRadius:12,padding:12,color:cNome.trim()?'white':'#9ca3af',fontWeight:700,cursor:cNome.trim()?'pointer':'default',fontFamily:'inherit'}}>
                {cEdit?'Salvar':'Cadastrar'}
              </button>
              {cEdit&&<button onClick={()=>{setCEdit(null);setCNome('');setCWhats('');setCEndereco('');setCObs('');}}
                style={{background:'#f0ebe4',border:'none',borderRadius:12,padding:'12px 16px',cursor:'pointer',fontFamily:'inherit'}}>
                Cancelar
              </button>}
            </div>
          </div>

          {ctx.clientes.length===0&&(
            <div style={{textAlign:'center',padding:'24px 0',color:C.text2,fontSize:13}}>Nenhum cliente cadastrado.</div>
          )}
          {ctx.clientes.map(c=>{
            const tel = (c.whatsapp||'').replace(/\D/g,'');
            const waLink = tel.length>=10 ? 'https://wa.me/55'+tel : null;
            return (
              <div key={c.id} className="card" style={{marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:14}}>{c.nome}</div>
                  {c.whatsapp&&(
                    <div style={{fontSize:12,color:C.text2,marginTop:2,display:'flex',alignItems:'center',gap:6}}>
                      {c.whatsapp}
                      {waLink&&(
                        <a href={waLink} target="_blank" rel="noopener noreferrer"
                          style={{display:'inline-flex',alignItems:'center',gap:3,background:'#25D366',color:'white',
                            borderRadius:8,padding:'2px 8px',fontSize:11,fontWeight:700,textDecoration:'none',whiteSpace:'nowrap'}}>
                          <svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                          WhatsApp
                        </a>
                      )}
                    </div>
                  )}
                  {c.endereco&&<div style={{fontSize:12,color:C.text2,marginTop:2}}>{c.endereco}</div>}
                  {c.obs&&<div style={{fontSize:11,color:C.text2,marginTop:2,fontStyle:'italic'}}>{c.obs}</div>}
                </div>
                <div style={{display:'flex',gap:6,marginLeft:8}}>
                  <button onClick={()=>{setCEdit(c);setCNome(c.nome);setCWhats(c.whatsapp||'');setCEndereco(c.endereco||'');setCObs(c.obs||'');}}
                    style={{background:'#f0ebe4',border:'none',borderRadius:10,padding:'6px 12px',cursor:'pointer',fontSize:12,fontFamily:'inherit'}}>Editar</button>
                  <button onClick={()=>ctx.delCliente(c.id)}
                    style={{background:'transparent',border:'none',cursor:'pointer',padding:6}}>{I.trash('#ccc',13)}</button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {subTab==='historico'&&(
        <div>
          {ctx.estoqueHist.length===0&&(
            <div style={{textAlign:'center',padding:'32px 0',color:C.text2,fontSize:13}}>Nenhum ajuste registrado ainda.</div>
          )}
          {ctx.estoqueHist.slice(0,100).map(h=>(
            <div key={h.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
              padding:'10px 14px',background:'white',borderRadius:12,marginBottom:6,border:`1px solid ${C.border}`}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:13,color:C.text}}>{h.nome}</div>
                <div style={{fontSize:11,color:C.text2,marginTop:2}}>{h.motivo} · {fmtDate(h.data)}</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{fontWeight:800,fontSize:15,color:h.tipo==='entrada'?C.green:C.red,minWidth:36,textAlign:'right'}}>
                  {h.tipo==='entrada'?'+':'-'}{h.quantidade}
                </div>
                <button onClick={()=>{if(window.confirm('Excluir este registro do histórico?')) ctx.delHistoricoEstoque(h.id);}}
                  style={{background:'transparent',border:'none',cursor:'pointer',padding:4,opacity:0.4,lineHeight:1}}
                  title="Excluir registro">
                  {I.trash('#666',12)}
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Modal de ajuste de estoque */}
      {ajuste&&(
        <div className="overlay" onClick={()=>setAjuste(null)}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <div className="sheet-handle"/>
            <div style={{fontWeight:800,fontSize:17,marginBottom:4}}>Ajuste de Estoque</div>
            <div style={{fontSize:13,color:C.text2,marginBottom:16}}>{ajuste.nome}</div>

            <div style={{display:'flex',gap:8,marginBottom:14}}>
              {[['entrada','📥 Entrada'],['saida','📤 Saída']].map(([k,l])=>(
                <button key={k} className="chip" onClick={()=>setAjTipo(k)}
                  style={{flex:1,justifyContent:'center',background:ajTipo===k?(k==='entrada'?C.green:C.red):'white',
                    color:ajTipo===k?'white':C.text2,border:`1px solid ${ajTipo===k?(k==='entrada'?C.green:C.red):C.border}`}}>
                  {l}
                </button>
              ))}
            </div>
            <label className="label">Quantidade *</label>
            <input className="input" type="number" inputMode="numeric" placeholder="Ex: 10"
              value={ajQtd} onChange={e=>setAjQtd(e.target.value)} style={{marginBottom:12}}/>
            <label className="label">Motivo *</label>
            <input className="input" placeholder={ajTipo==='entrada'?'Ex: Produção semanal':'Ex: Quebra / Venda manual'}
              value={ajMotivo} onChange={e=>setAjMotivo(e.target.value)} style={{marginBottom:20}}/>
            <button onClick={salvarAjuste} disabled={!ajQtd||!ajMotivo.trim()}
              style={{width:'100%',background:(!ajQtd||!ajMotivo.trim())?'#e5e7eb':(ajTipo==='entrada'?C.green:C.red),
                border:'none',borderRadius:14,padding:14,color:(!ajQtd||!ajMotivo.trim())?'#9ca3af':'white',
                fontWeight:800,cursor:(!ajQtd||!ajMotivo.trim())?'default':'pointer',fontSize:15,fontFamily:'inherit'}}>
              Confirmar Ajuste
            </button>
          </div>
        </div>
      )}

      {/* Modal de criar/editar sabor */}
      {saborForm&&(
        <div className="overlay" onClick={()=>setSaborForm(null)}>

            <label className="label">Categoria</label>
            <div style={{display:'flex',gap:6,marginBottom:12}}>
              {[['grande','Grande'],['mini','Mini'],['doce','Doce']].map(([k,l])=>(
                <button key={k} className="chip" onClick={()=>setSfCat(k)}
                  style={{flex:1,justifyContent:'center',background:sfCat===k?C.red:'white',color:sfCat===k?'white':C.text2,
                    border:`1px solid ${sfCat===k?C.red:C.border}`,fontSize:12}}>
                  {l}
                </button>
              ))}
            </div>
            <label className="label">Nome *</label>
            <input className="input" placeholder="Ex: Margherita Especial" value={sfNome} onChange={e=>setSfNome(e.target.value)} style={{marginBottom:10}}/>
            <label className="label">Preço (R$) *</label>
            <input className="input" type="number" inputMode="decimal" placeholder="Ex: 55" value={sfPreco} onChange={e=>setSfPreco(e.target.value)} style={{marginBottom:10}}/>
            <label className="label">Descrição</label>
            <textarea className="input" placeholder="Ingredientes do sabor" value={sfDesc} onChange={e=>setSfDesc(e.target.value)}
              style={{marginBottom:20,minHeight:70,resize:'vertical',fontFamily:'inherit'}}/>

            <label className="label">Receituário (para cálculo de CMV)</label>
            {sfReceita.map((item,idx)=>{
              const mp = ctx.materiasPrimas.find(m=>m.id===item.materiaPrimaId);
              const custoItem = item.materiaPrimaId && item.quantidade ? custoItemReceita(ctx.contas, ctx.materiasPrimas, {...item,quantidade:parseFloat(item.quantidade)||0}) : 0;
              return (
                <div key={idx} style={{marginBottom:8}}>
                  <div style={{display:'flex',gap:6,alignItems:'center'}}>
                    <select className="input" style={{flex:1,padding:'10px 8px'}} value={item.materiaPrimaId} onChange={e=>updItemReceita(idx,'materiaPrimaId',e.target.value)}>
                      <option value="">Matéria prima...</option>
                      {ctx.materiasPrimas.map(m=><option key={m.id} value={m.id}>{m.nome}</option>)}
                    </select>
                    <input className="input" type="number" inputMode="decimal" placeholder="Qtd" style={{width:64,padding:'10px 8px',textAlign:'center'}}
                      value={item.quantidade} onChange={e=>updItemReceita(idx,'quantidade',e.target.value)}/>
                    <select className="input" style={{width:64,padding:'10px 4px'}} value={item.unidade||(mp?mp.unidadePadrao:'')||''} onChange={e=>updItemReceita(idx,'unidade',e.target.value)}>
                      <option value="">Un.</option>
                      {ctx.unidadesMedida.map(u=><option key={u} value={u}>{u}</option>)}
                    </select>
                    <button onClick={()=>rmItemReceita(idx)} style={{background:'none',border:'none',cursor:'pointer',flexShrink:0}}>{I.x(C.red,18)}</button>
                  </div>
                  {item.materiaPrimaId && item.quantidade && (
                    <div style={{fontSize:11,color:custoItem?C.text2:C.red,marginTop:3,marginLeft:2}}>
                      {custoItem ? `Custo: ${fmtBRL(custoItem)}` : 'Sem preço/unidade compatível para esta matéria prima'}
                    </div>
                  )}
                </div>
              );
            })}
            <button onClick={addItemReceita} style={{display:'flex',alignItems:'center',gap:4,background:'transparent',border:`1px solid ${C.border}`,borderRadius:10,padding:'6px 12px',cursor:'pointer',fontSize:12,fontWeight:700,color:C.red,fontFamily:'inherit',marginBottom:14}}>
              {I.plus(C.red,12)} Adicionar ingrediente
            </button>

            {sfReceita.some(it=>it.materiaPrimaId&&it.quantidade) && (() => {
              const cmvAtual = sfReceita.filter(it=>it.materiaPrimaId&&it.quantidade).reduce((s,it)=>s+custoItemReceita(ctx.contas, ctx.materiasPrimas, {...it,quantidade:parseFloat(it.quantidade)||0}),0);
              const precoNum = parseFloat(sfPreco)||0;
              return (
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:'#fff7ed',border:'1px solid #fde68a',borderRadius:12,padding:'12px 14px',marginBottom:20}}>
                  <span style={{fontSize:13,fontWeight:700,color:'#b45309'}}>CMV total</span>
                  <span style={{fontSize:18,fontWeight:900,color:'#b45309'}}>{fmtBRL(cmvAtual)}{precoNum?` (${Math.round(cmvAtual/precoNum*100)}%)`:''}</span>
                </div>
              );
            })()}

            <div style={{display:'flex',gap:8}}>
              <button onClick={salvarSabor} disabled={!sfNome.trim()||!sfPreco}
                style={{flex:1,background:(!sfNome.trim()||!sfPreco)?'#e5e7eb':C.red,border:'none',borderRadius:14,padding:14,
                  color:(!sfNome.trim()||!sfPreco)?'#9ca3af':'white',fontWeight:800,cursor:(!sfNome.trim()||!sfPreco)?'default':'pointer',
                  fontSize:15,fontFamily:'inherit'}}>
                Salvar
              </button>
              {saborForm.id&&(
                <button onClick={excluirSabor}
                  style={{background:'#fef2f2',border:`1px solid #fecaca`,borderRadius:14,padding:'14px 16px',cursor:'pointer',fontFamily:'inherit'}}>
                  {I.trash(C.red,15)}
                </button>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


// ── AUTH GATE ───────────────────────────────────────────────────────────────
function AuthGate() {
  const [authState, setAuthState] = useState('loading'); // 'loading'|'logado'|'deslogado'
  const [userEmail, setUserEmail] = useState('');

  useEffect(() => {
    const unsub = window.__fbauth.onAuthStateChanged(u => {
      if (u) { setUserEmail(u.email); setAuthState('logado'); }
      else    { setAuthState('deslogado'); }
    });
    return unsub;
  }, []);

  if (authState === 'loading') return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',
      background:'#1a1a1a',flexDirection:'column',gap:14}}>
      <div style={{width:44,height:44,border:'4px solid rgba(200,24,26,0.25)',
        borderTopColor:'#C8181A',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>
      <div style={{color:'rgba(255,255,255,0.5)',fontSize:14}}>Carregando...</div>
    </div>
  );

  if (authState === 'deslogado') return <LoginScreen onLogin={()=>setAuthState('logado')}/>;

  return <App currentUserEmail={userEmail} onLogout={()=>{window.__fbauth.signOut();setAuthState('deslogado');}}/>;
}

// ── LOGIN SCREEN ─────────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [email,    setEmail]    = useState('');
  const [senha,    setSenha]    = useState('');
  const [lembrar,  setLembrar]  = useState(true);
  const [loading,  setLoading]  = useState(false);
  const [erro,     setErro]     = useState('');
  const [showPwd,  setShowPwd]  = useState(false);

  const entrar = async () => {
    if (!email.trim() || !senha) { setErro('Preencha e-mail e senha.'); return; }
    setLoading(true); setErro('');
    try {
      const persistence = lembrar
        ? firebase.auth.Auth.Persistence.LOCAL
        : firebase.auth.Auth.Persistence.SESSION;
      await window.__fbauth.setPersistence(persistence);
      await window.__fbauth.signInWithEmailAndPassword(email.trim(), senha);
      onLogin();
    } catch(e) {
      const msgs = {
        'auth/user-not-found':    'E-mail não cadastrado.',
        'auth/wrong-password':    'Senha incorreta.',
        'auth/invalid-email':     'E-mail inválido.',
        'auth/too-many-requests': 'Muitas tentativas. Aguarde alguns minutos.',
        'auth/invalid-credential':'E-mail ou senha incorretos.',
      };
      setErro(msgs[e.code] || 'Erro ao entrar. Verifique os dados.');
    } finally { setLoading(false); }
  };

  return (
    <div style={{minHeight:'100vh',background:'#1a1a1a',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}} @keyframes fadein{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}`}</style>
      <div style={{background:'#242424',borderRadius:24,padding:'36px 32px',width:'100%',maxWidth:380,
        boxShadow:'0 24px 64px rgba(0,0,0,0.5)',animation:'fadein 0.4s ease'}}>

        {/* Logo */}
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{fontSize:11,color:'rgba(200,24,26,0.8)',letterSpacing:4,textTransform:'uppercase',marginBottom:4}}>Sistema de Gestão</div>
          <div style={{fontFamily:'Georgia,serif',fontSize:28,fontWeight:700,color:'white',lineHeight:1.1}}>Fino Palastro</div>
          <div style={{width:40,height:2,background:'#C8181A',margin:'10px auto 0'}}/>
        </div>

        {/* Form */}
        <div style={{marginBottom:14}}>
          <label style={{display:'block',fontSize:11,fontWeight:700,color:'rgba(255,255,255,0.45)',
            textTransform:'uppercase',letterSpacing:0.8,marginBottom:8}}>E-mail</label>
          <input value={email} onChange={e=>setEmail(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&entrar()}
            placeholder="seu@email.com" type="email" autoComplete="email"
            style={{width:'100%',background:'#2e2e2e',border:'1px solid #3a3a3a',borderRadius:12,
              padding:'13px 16px',color:'white',fontSize:15,outline:'none',fontFamily:'inherit',
              boxSizing:'border-box'}}/>
        </div>

        <div style={{marginBottom:20,position:'relative'}}>
          <label style={{display:'block',fontSize:11,fontWeight:700,color:'rgba(255,255,255,0.45)',
            textTransform:'uppercase',letterSpacing:0.8,marginBottom:8}}>Senha</label>
          <input value={senha} onChange={e=>setSenha(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&entrar()}
            placeholder="••••••••" type={showPwd?'text':'password'} autoComplete="current-password"
            style={{width:'100%',background:'#2e2e2e',border:'1px solid #3a3a3a',borderRadius:12,
              padding:'13px 44px 13px 16px',color:'white',fontSize:15,outline:'none',fontFamily:'inherit',
              boxSizing:'border-box'}}/>
          <button onClick={()=>setShowPwd(v=>!v)}
            style={{position:'absolute',right:12,top:36,background:'none',border:'none',cursor:'pointer',
              color:'rgba(255,255,255,0.35)',fontSize:16,padding:4}}>
            {showPwd?'🙈':'👁'}
          </button>
        </div>

        {/* Lembrar */}
        <label style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer',marginBottom:22}}>
          <input type="checkbox" checked={lembrar} onChange={e=>setLembrar(e.target.checked)}
            style={{width:18,height:18,accentColor:'#C8181A',cursor:'pointer'}}/>
          <span style={{fontSize:13,color:'rgba(255,255,255,0.55)'}}>Entrar automaticamente na próxima vez</span>
        </label>

        {/* Erro */}
        {erro && (
          <div style={{background:'rgba(200,24,26,0.12)',border:'1px solid rgba(200,24,26,0.4)',
            borderRadius:10,padding:'10px 14px',marginBottom:16,color:'#f87171',fontSize:13,fontWeight:600}}>
            {erro}
          </div>
        )}

        {/* Botão */}
        <button onClick={entrar} disabled={loading}
          style={{width:'100%',background:loading?'#3a3a3a':'#C8181A',border:'none',borderRadius:14,
            padding:15,color:loading?'rgba(255,255,255,0.3)':'white',fontWeight:800,fontSize:15,
            cursor:loading?'default':'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',
            justifyContent:'center',gap:10,transition:'background 0.2s'}}>
          {loading
            ? <><div style={{width:18,height:18,border:'2px solid rgba(255,255,255,0.2)',borderTopColor:'white',borderRadius:'50%',animation:'spin 0.7s linear infinite'}}/> Entrando...</>
            : 'Entrar'}
        </button>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<AuthGate/>);
</script>
