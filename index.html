// ── Custo de matéria-prima / CMV helpers ────────────────────────────────────
// Converte qtd+unidade para uma "unidade base" (G para massa, ML para volume,
// a própria unidade para UN/PCT/CX, que não têm conversão natural).
const toBaseQtd = (qtd, unidade) => {
  switch (unidade) {
    case 'KG': return { qtd: (qtd||0)*1000, base: 'G' };
    case 'G':  return { qtd: (qtd||0),       base: 'G' };
    case 'LT': return { qtd: (qtd||0)*1000, base: 'ML' };
    case 'ML': return { qtd: (qtd||0),       base: 'ML' };
    default:   return { qtd: (qtd||0),       base: unidade || 'UN' };
  }
};
const baseLabel = b => (b==='G' ? 'KG' : b==='ML' ? 'LT' : b);

// Busca as compras (contas a pagar) referentes a uma matéria-prima pelo nome,
// mais recentes primeiro. Usa correspondência exata e cai para "contém" se não achar.
// Considera tanto contas "simples" (descricao/quantidade/valor no topo) quanto contas
// com múltiplos itens (conta.itens: [{nome,quantidade,unidade,valor}]) — uma única conta
// a pagar pode representar a compra de várias matérias-primas diferentes de uma vez.
const comprasDeMP = (contas, mpNome) => {
  const nomeLower = (mpNome||'').toLowerCase().trim();
  if (!nomeLower) return [];
  const extrair = (matchFn) => {
    const out = [];
    contas.forEach(c => {
      if (c.tipo!=='pagar') return;
      if (Array.isArray(c.itens) && c.itens.length) {
        c.itens.forEach(it => {
          if (it && it.quantidade>0 && matchFn((it.nome||'').toLowerCase().trim())) {
            out.push({ valor: it.valor||0, quantidade: it.quantidade, unidade: it.unidade,
              vencimento: c.vencimento, criadoEm: c.criadoEm, cliente: c.cliente });
          }
        });
      } else if (c.descricao && c.quantidade>0 && matchFn(c.descricao.toLowerCase().trim())) {
        out.push({ valor: c.valor||0, quantidade: c.quantidade, unidade: c.unidade,
          vencimento: c.vencimento, criadoEm: c.criadoEm, cliente: c.cliente });
      }
    });
    return out;
  };
  let lista = extrair(n => n===nomeLower);
  if (!lista.length) lista = extrair(n => n.includes(nomeLower));
  return lista.sort((a,b)=>(b.vencimento||b.criadoEm||'') > (a.vencimento||a.criadoEm||'') ? 1 : -1);
};

// Último preço pago por uma matéria-prima, na unidade original da compra e,
// quando possível (KG/G, LT/ML), normalizado para uma unidade "base" (KG ou LT).
const ultimoPrecoMP = (contas, mp) => {
  if (!mp) return null;
  // Preço definido manualmente na própria matéria-prima tem prioridade sobre o
  // histórico de compras — é o jeito do usuário corrigir/fixar o valor do kg
  // direto no cadastro, sem precisar lançar uma conta a pagar.
  if (mp.precoManual > 0) {
    const unidade = mp.unidadePadrao || 'UN';
    const { qtd, base } = toBaseQtd(1, unidade);
    const custoPorBase = mp.precoManual / (qtd || 1);
    const custoExibicao = (base==='G'||base==='ML') ? custoPorBase*1000 : custoPorBase;
    return {
      custoPorBase, custoExibicao, base, unidadeBase: baseLabel(base),
      precoOriginal: mp.precoManual, qtdOriginal: 1, unidadeOriginal: unidade,
      data: null, fornecedor: '', manual: true
    };
  }
  const compras = comprasDeMP(contas, mp.nome);
  if (!compras.length) return null;
  const c = compras[0];
  const unidade = c.unidade || mp.unidadePadrao || '';
  const { qtd, base } = toBaseQtd(c.quantidade, unidade);
  if (!qtd) return null;
  const custoPorBase = c.valor / qtd; // R$ por unidade BASE (G ou ML) — usado nos cálculos de CMV
  // R$ por unidade "natural" (KG/LT) para exibição — G e ML equivalem a 1/1000 de KG/LT
  const custoExibicao = (base==='G'||base==='ML') ? custoPorBase*1000 : custoPorBase;
  return {
    custoPorBase, custoExibicao, base, unidadeBase: baseLabel(base),
    precoOriginal: c.valor, qtdOriginal: c.quantidade, unidadeOriginal: unidade,
    data: c.vencimento || c.criadoEm, fornecedor: c.cliente || '', manual: false
  };
};

// Custo de um item de receita ({materiaPrimaId, quantidade, unidade}), usando o
// último preço pago pela matéria-prima correspondente. Retorna 0 se a unidade do
// item for incompatível com a unidade da última compra (ex: receita em UN vs compra em KG).
const custoItemReceita = (contas, materiasPrimas, item) => {
  const mp = materiasPrimas.find(m => m.id === item.materiaPrimaId);
  if (!mp) return 0;
  const info = ultimoPrecoMP(contas, mp);
  if (!info) return 0;
  const { qtd, base } = toBaseQtd(item.quantidade, item.unidade || mp.unidadePadrao || '');
  if (base !== info.base) return 0;
  return qtd * info.custoPorBase;
};

// CMV total de um sabor, somando o custo de cada item da sua receita.
const cmvSabor = (contas, materiasPrimas, sabor) => {
  if (!sabor || !Array.isArray(sabor.receita)) return 0;
  return sabor.receita.reduce((s,item) => s + custoItemReceita(contas, materiasPrimas, item), 0);
};

  }
};

// ── APP ────────────────────────────────────────────────────────────────
function App({ currentUserEmail, onLogout }) {
  const [tab,    setTab]    = useState('dashboard');
  const [trans,  setTrans]  = useState(()=>db.get('fp_trans',[]));
  const [orders, setOrders] = useState(()=>db.get('fp_orders',[]));
  const [events, setEvents] = useState(()=>db.get('fp_events',[]));
  const [products,  setProducts]  = useState(()=>db.get('fp_products', PRODUCTS_DEFAULT));
  const [openBal,   setOpenBal]   = useState(()=>parseFloat(db.get('fp_opening_bal',0))||0);
  const [showProds, setShowProds] = useState(false);

  const [modal,    setModal]    = useState(null);
  const [mData,    setMData]    = useState(null);
  const [sheetId,  setSheetId]  = useState(()=>db.get('fp_sheet_id',''));
  const [syncing,  setSyncing]  = useState(false);
  const [lastSync, setLastSync] = useState(()=>db.get('fp_last_sync',null));
  const [syncMsg,  setSyncMsg]  = useState(null);
  const [showCfg,  setShowCfg]  = useState(false);
  const [cloudStatus, setCloudStatus] = useState('idle'); // idle|syncing|ok|error
  const [contas,        setContas]        = useState(()=>db.get('fp_contas',[]));
  const [catsPagar,     setCatsPagar]     = useState(()=>db.get('fp_cats_pagar', CATS_P_DEFAULT));
  const [unidadesMedida,setUnidadesMedida]= useState(()=>db.get('fp_unidades', UNIDADES_DEFAULT));
  const [fornecedores,  setFornecedores]  = useState(()=>db.get('fp_fornecedores', []));
  const [clientes,      setClientes]      = useState(()=>db.get('fp_clientes', []));
  const [materiasPrimas,setMateriasPrimas]= useState(()=>db.get('fp_materias_primas', []));
  const [estoqueData,   setEstoqueData]   = useState(()=>db.get('fp_estoque', {}));
  const [estoqueHist,   setEstoqueHist]   = useState(()=>db.get('fp_estoque_hist', []));
  const [sabores,       setSabores]       = useState(()=>db.get('fp_sabores', PIZZAS_ESTOQUE_DEFAULT));
  const [catsReceber,   setCatsReceber]   = useState(()=>db.get('fp_cats_receber', CATS_R_DEFAULT));
  const [catsIn,        setCatsIn]        = useState(()=>db.get('fp_cats_in', CATS_IN_DEFAULT));
  const [catsOut,       setCatsOut]       = useState(()=>db.get('fp_cats_out', CATS_OUT_DEFAULT));
  const [alertKey, setAlertKey] = useState('');
  const [newCardapioCount, setNewCardapioCount] = useState(0);
  const [notifPerm, setNotifPerm] = useState(()=> 'Notification' in window ? Notification.permission : 'unsupported');
  const initDone = React.useRef(false);
  const importedCardapioIds = React.useRef(new Set());

  // Solicita permissão de notificação ao montar (após login).
  // Importante: pedir só a permissão do navegador (Notification.requestPermission)
  // NÃO é suficiente para receber push de verdade com o app fechado/celular
  // bloqueado — é preciso também inscrever o dispositivo no OneSignal
  // (PushSubscription.optIn), que é quem entrega a notificação via service
  // worker mesmo sem o app aberto.
  const ativarPushOneSignal = () => {
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    window.OneSignalDeferred.push(async function(OneSignal) {
      try {
        await OneSignal.Notifications.requestPermission();
        await OneSignal.User.PushSubscription.optIn();
      } catch(e) {}
      setNotifPerm('Notification' in window ? Notification.permission : 'unsupported');
    });
  };
  useEffect(() => {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'default' || Notification.permission === 'granted') {
      // 'default' → pede permissão; 'granted' → garante que o OneSignal
      // também registrou a inscrição (pode já estar ok, mas optIn() é seguro
      // de chamar de novo — evita o caso de permissão concedida no navegador
      // sem o dispositivo nunca ter sido inscrito no OneSignal).
      ativarPushOneSignal();
    }
  }, []);

  useEffect(()=>{ if(initDone.current) db.set('fp_trans',   trans);  }, [trans]);
  useEffect(()=>{ if(initDone.current) db.set('fp_orders',  orders); }, [orders]);
  useEffect(()=>{ if(initDone.current) db.set('fp_events',  events); }, [events]);
  useEffect(()=>{ if(initDone.current) db.set('fp_sheet_id', sheetId); }, [sheetId]);
  useEffect(()=>{ if(initDone.current) db.set('fp_products', products); }, [products]);
  useEffect(()=>{ if(initDone.current) db.set('fp_opening_bal', openBal); }, [openBal]);
  useEffect(()=>{ if(initDone.current) db.set('fp_contas',       contas);       }, [contas]);
  useEffect(()=>{ if(initDone.current) db.set('fp_cats_pagar',   catsPagar);    }, [catsPagar]);
  useEffect(()=>{ if(initDone.current) db.set('fp_unidades',    unidadesMedida);}, [unidadesMedida]);
  useEffect(()=>{ if(initDone.current) db.set('fp_fornecedores',    fornecedores);    }, [fornecedores]);
  useEffect(()=>{ if(initDone.current) db.set('fp_clientes',        clientes);        }, [clientes]);
  useEffect(()=>{ if(initDone.current) db.set('fp_materias_primas', materiasPrimas);  }, [materiasPrimas]);
  useEffect(()=>{ if(initDone.current) db.set('fp_estoque',      estoqueData);  }, [estoqueData]);
  useEffect(()=>{ if(initDone.current) db.set('fp_estoque_hist', estoqueHist);  }, [estoqueHist]);
  useEffect(()=>{ if(initDone.current) db.set('fp_sabores',      sabores);      }, [sabores]);
  useEffect(()=>{ if(initDone.current) db.set('fp_cats_receber', catsReceber);  }, [catsReceber]);
  useEffect(()=>{ if(initDone.current) db.set('fp_cats_in',      catsIn);       }, [catsIn]);
  useEffect(()=>{ if(initDone.current) db.set('fp_cats_out',     catsOut);      }, [catsOut]);

  const addTrans  = t => setTrans(p  => [{...t,  id:genId()}, ...p]);
  const addOrder  = o => {
    const nId = genId(); const ord = {...o, id:nId, createdAt:today()};
    setOrders(p => [ord, ...p]);
    setContas(p => [{id:genId(), tipo:'receber', descricao:`Pedido – ${o.client||'Cliente'}`,
      valor:o.total||0, vencimento:o.deliveryDate||today(), categoria:'Pedido',
      cliente:o.client||'', origemId:nId, origemTipo:'pedido',
      pago:false, criadoEm:today(), pagoEm:null}, ...p]);
  };
  const addEvent  = e => setEvents(p => [{...e,  id:genId(), createdAt:today()}, ...p]);
  const updOrder  = (id,d) => {
    const old = orders.find(o => o.id===id);
    setOrders(p => p.map(o => o.id===id?{...o,...d}:o));
    if (d.status==='delivered' && !d.paid) {
      setContas(p => p.map(c => c.origemId===id&&c.tipo==='receber'&&!c.pago ? {...c,vencimento:today()} : c));
    }
    // Debita o estoque assim que o pedido entra em "Confirmado" OU "Entregue"
    // (o que vier primeiro — o botão "Pago" pula direto de Pendente pra
    // Entregue sem passar por Confirmado, então não dá pra checar só um dos
    // dois). Se sair desses dois status sem ter virado venda (volta pra
    // pendente ou é cancelado), repõe o estoque.
    if (old && d.status && d.status!==old.status) {
      const DEBITA = ['confirmed','delivered'];
      const entrouEmDebito = DEBITA.includes(d.status) && !DEBITA.includes(old.status);
      const saiuDoDebito   = !DEBITA.includes(d.status) && DEBITA.includes(old.status);
      if (entrouEmDebito && !old.estoqueDebitado) {
        debitarEstoquePedido(old.items||[]);
        setOrders(p => p.map(o => o.id===id?{...o,estoqueDebitado:true}:o));
      } else if (saiuDoDebito && old.estoqueDebitado) {
        reporEstoquePedido(old.items||[]);
        setOrders(p => p.map(o => o.id===id?{...o,estoqueDebitado:false}:o));
      }
    }
  };
  const updEvent  = (id,d) => setEvents(p => p.map(e => e.id===id?{...e,...d}:e));
  const delTrans  = id => setTrans(p => p.filter(t => t.id!==id));
  const addConta   = c => setContas(p => [{...c, id:genId(), criadoEm:today()}, ...p]);
  const updConta   = (id,d) => setContas(p => p.map(c => c.id===id?{...c,...d}:c));
  // `juros` é somado só no valor efetivamente pago/recebido (valorRecebido) e na
  // transação financeira — NUNCA no campo `valor` da conta. O `valor`/`itens[].valor`
  // é o que comprasDeMP/ultimoPrecoMP usam para calcular o custo da matéria-prima
  // (CMV), então juros por atraso de pagamento não pode inflar esse custo.
  const pagarConta = (id,desconto=0,juros=0) => {
    const conta = contas.find(c => c.id===id);
    if (conta) {
      const valorFinal = Math.max(0,(conta.valor||0)-(desconto||0)+(juros||0));
      addTrans({
        date: today(),
        type: conta.tipo==='receber' ? 'entrada' : 'saida',
        category: conta.categoria || (conta.tipo==='receber' ? 'Outros' : 'Outros'),
        amount: valorFinal,
        description: conta.descricao || '',
        paymentMethod: 'Pix',
        ref: conta.id
      });
    }
    setContas(p => p.map(c => c.id===id?{...c,pago:true,pagoEm:today(),desconto:desconto||0,juros:juros||0,
      valorRecebido:Math.max(0,(c.valor||0)-(desconto||0)+(juros||0))}:c));
  };
  const delConta   = id => setContas(p => p.filter(c => c.id!==id));

  const open  = (m,d=null)=>{ setModal(m); setMData(d); };
  const close = ()=>{ setModal(null); setMData(null); };

  // Fornecedores
  const addFornecedor = f => setFornecedores(p=>[{...f,id:genId(),criadoEm:today()},...p]);
  const updFornecedor = (id,d) => setFornecedores(p=>p.map(f=>f.id===id?{...f,...d}:f));
  const delFornecedor = id => setFornecedores(p=>p.filter(f=>f.id!==id));

  // Clientes
  const addCliente = c => setClientes(p=>[{...c,id:genId(),criadoEm:today()},...p]);
  const updCliente = (id,d) => setClientes(p=>p.map(c=>c.id===id?{...c,...d}:c));
  const delCliente = id => setClientes(p=>p.filter(c=>c.id!==id));
  const addMateriaPrima = m => setMateriasPrimas(p=>[{...m,id:genId(),criadoEm:today()},...p]);
  const updMateriaPrima = (id,d) => setMateriasPrimas(p=>p.map(m=>m.id===id?{...m,...d}:m));
  const delMateriaPrima = id => setMateriasPrimas(p=>p.filter(m=>m.id!==id));
  const delHistoricoEstoque = id => setEstoqueHist(p=>p.filter(h=>h.id!==id));

  // Sabores (catálogo único — alimenta Estoque, Eventos Express e o site de pedidos)
  const addSabor = s => setSabores(p=>[...p,{...s,id:genId()}]);
  const updSabor = (id,d) => setSabores(p=>p.map(s=>s.id===id?{...s,...d}:s));
  const delSabor = id => setSabores(p=>p.filter(s=>s.id!==id));

  // ── Estoque: escrita sempre baseada na versão mais recente da nuvem ────────
  // Bug anterior: cada função abaixo partia do `estoqueData` que já estava em
  // memória neste aparelho/aba (via setEstoqueData(prev=>...)). Se este app
  // ficasse aberto por dias sem recarregar (comum num celular/PWA em segundo
  // plano) e ALGUÉM atualizasse o estoque por outro aparelho, este aparelho
  // continuava com uma cópia antiga em memória. No primeiro pedido que
  // chegasse e fosse debitado por aqui, ele recalculava a partir dessa cópia
  // antiga e sobrescrevia a nuvem — apagando a atualização manual feita em
  // outro lugar. Agora toda mudança lê o valor atual direto do Firestore
  // (numa transação, à prova de duas escritas simultâneas) e só então aplica
  // o ajuste, eliminando esse "voltar para uma base antiga".
  const aplicarMudancaEstoque = (mutate) => {
    const ref = window.__fsdb.collection('fp_data').doc('fp_estoque');
    let tsUsado = 0;
    return window.__fsdb.runTransaction(tx => tx.get(ref).then(snap => {
      const d = snap.exists ? snap.data() : null;
      const atual = (d && d.data && typeof d.data==='object' && !Array.isArray(d.data)) ? d.data : {};
      const novo = mutate(atual);
      tsUsado = Date.now();
      tx.set(ref, {data:novo, ts:tsUsado});
      return novo;
    })).then(novo => {
      setEstoqueData(novo);
      // Mesmo `ts` usado na nuvem é gravado aqui — é o que permite ao
      // sincronismo de inicialização (Cloud Sync) saber que esta é a versão
      // mais recente e ignorar qualquer leitura da nuvem mais antiga.
      try { localStorage.setItem('fp_estoque', JSON.stringify(novo)); localStorage.setItem('fp_estoque__ts', String(tsUsado)); } catch(e){}
      // Cópia para o cardápio ler (chave separada, lida pelo site público)
      try { window.__fsdb.collection('fp_data').doc('fp_estoque_cardapio').set({data:novo,ts:tsUsado}).catch(()=>{}); } catch(e){}
      return novo;
    }).catch(() => {
      // Sem internet/Firestore indisponível: aplica localmente mesmo assim,
      // para não bloquear o uso — vai sincronizar quando voltar a conexão.
      setEstoqueData(prev => mutate(prev));
    });
  };

  // Estoque — ajuste manual ou automático
  const ajustarEstoque = (nome, delta, motivo, tipo) => {
    aplicarMudancaEstoque(atual => {
      const val = atual[nome] !== undefined ? atual[nome] : null;
      const novoVal = val === null ? Math.max(0, delta) : Math.max(0, val + delta);
      return {...atual, [nome]: novoVal};
    });
    setEstoqueHist(p=>[{id:genId(),nome,tipo,quantidade:Math.abs(delta),motivo,data:today()},...p].slice(0,500));
  };

  const debitarEstoquePedido = (itens) => {
    aplicarMudancaEstoque(atual => {
      const next = {...atual};
      itens.forEach(item => {
        const nome = item.productName||item.nome||'';
        if (next[nome] !== undefined && next[nome] !== null) {
          // Mesmo sem saldo suficiente, o pedido é contabilizado: o estoque
          // pode ficar negativo, indicando o quanto falta repor para este cliente.
          next[nome] = next[nome] - (item.qty||1);
        }
      });
      return next;
    });
  };

  // Repõe ao estoque os itens de um pedido que deixou de estar confirmado
  // (voltou pra pendente ou foi cancelado) antes de ser entregue.
  const reporEstoquePedido = (itens) => {
    aplicarMudancaEstoque(atual => {
      const next = {...atual};
      itens.forEach(item => {
        const nome = item.productName||item.nome||'';
        if (next[nome] !== undefined && next[nome] !== null) {
          next[nome] = next[nome] + (item.qty||1);
        }
      });
      return next;
    });
  };

  const paidOrder = o => {
    const pd = today();
    updOrder(o.id,{paid:true,status:'delivered',paidAt:pd});
    addTrans({date:pd,type:'entrada',category:'Venda Congelada',amount:o.total,description:`Pedido – ${o.client}`,paymentMethod:'Pix',ref:o.id});
    setContas(p => p.map(c => c.origemId===o.id&&c.tipo==='receber'?{...c,pago:true,pagoEm:pd}:c));
  };
  // Desfaz um pagamento marcado por engano: remove o lançamento financeiro
  // gerado, reabre a conta a receber vinculada (se houver) e volta o pedido
  // para "não pago" e status "Pendente" (aberto), sem precisar cancelar/recriar.
  const unpaidOrder = o => {
    updOrder(o.id,{paid:false,status:'pending',paidAt:null});
    setTrans(p => p.filter(t => !(t.ref===o.id && t.type==='entrada')));
    setContas(p => p.map(c => c.origemId===o.id&&c.tipo==='receber'?{...c,pago:false,pagoEm:null}:c));
  };
  const paidEvent = e => {
    const pd = today();
    updEvent(e.id,{paid:true,status:'realizado',paidAt:pd});
    addTrans({date:pd,type:'entrada',category:e.type==='ao_vivo'?'Evento ao Vivo':'Evento Express',amount:e.proposedValue,description:`Evento – ${e.client}`,paymentMethod:'Pix',ref:e.id});
  };

  // ── SYNC GOOGLE SHEETS ───────────────────────────────────────────────
  // JSONP helper — bypasses CORS when app is opened as a local file
  const fetchGviz = (url) => new Promise((resolve, reject) => {
    const cb = '__gviz_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const to = setTimeout(() => {
      delete window[cb]; script.parentNode&&script.parentNode.removeChild(script);
      reject(new Error('Timeout: planilha demorou demais para responder.'));
    }, 12000);
    window[cb] = (data) => {
      clearTimeout(to); delete window[cb];
      script.parentNode&&script.parentNode.removeChild(script);
      resolve(data);
    };
    const script = document.createElement('script');
    script.onerror = () => {
      clearTimeout(to); delete window[cb];
      script.parentNode&&script.parentNode.removeChild(script);
      reject(new Error('Planilha não encontrada ou não está pública. Compartilhe como "Qualquer pessoa com o link pode visualizar".'));
    };
    script.src = url + '&tqx=responseHandler:' + cb;
    document.head.appendChild(script);
  });

  const syncFromSheets = async (overrideId) => {
    const rawId = (typeof overrideId === 'string' && overrideId) ? overrideId : sheetId;
    // Accept full URL or just the ID
    const m = typeof rawId === 'string' && rawId.match(/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
    const id = m ? m[1] : rawId;
    if (!id || syncing) return;
    setSyncing(true); setSyncMsg(null);
    let no = 0, ne = 0;
    try {
      const existO = new Set(orders.filter(o=>o.sheetId).map(o=>o.sheetId));
      const existE = new Set(events.filter(e=>e.sheetId).map(e=>e.sheetId));

      // ── Pedidos ──
      const d1 = await fetchGviz(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?sheet=Pedidos`);
      if (!d1?.table) throw new Error('Aba "Pedidos" não encontrada. Verifique o nome exato da aba na planilha.');
      const newOrds = [];
      if (d1.table.rows) {
        d1.table.rows.forEach(row => {
          const c = row.c||[]; const g = i => { const v=c[i]?.v; return v===null||v===undefined?'':String(v); };
          const sid = g(0); if (!sid || existO.has(sid)) return;
          const rawItems = g(4); const total = parseFloat(g(5))||0;
          if (!g(2)) return;
          newOrds.push({ id:genId(), sheetId:sid, source:'whatsapp',
            client:g(2), whatsapp:g(3),
            items:[{ productId:'wh', productName:rawItems||'(ver obs.)', qty:1, unitPrice:total, cat:'grande' }],
            total, deliveryDate:g(6), deliveryAddress:g(7), notes:g(8),
            status:'pending', paid:false, createdAt:today() });
          no++;
        });
      }
      if (newOrds.length > 0) {
        setOrders(p => [...newOrds, ...p]);
        const newContasR = newOrds.map(o => ({id:genId(), tipo:'receber',
          descricao:`Pedido – ${o.client||'Cliente'}`, valor:o.total||0,
          vencimento:o.deliveryDate||o.createdAt, categoria:'Pedido',
          cliente:o.client||'', origemId:o.id, origemTipo:'pedido',
          pago:false, criadoEm:today(), pagoEm:null}));
        setContas(p => [...newContasR, ...p]);
      }

      // ── Eventos ──
      const d2 = await fetchGviz(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?sheet=Eventos`);
      if (!d2?.table) throw new Error('Aba "Eventos" não encontrada. Verifique o nome exato da aba na planilha.');
      const newEvts = [];
      if (d2.table.rows) {
        d2.table.rows.forEach(row => {
          const c = row.c||[]; const g = i => { const v=c[i]?.v; return v===null||v===undefined?'':String(v); };
          const sid = g(0); if (!sid || existE.has(sid)) return;
          if (!g(2)) return;
          const t = g(4).toLowerCase().includes('express') ? 'express' : 'ao_vivo';
          newEvts.push({ id:genId(), sheetId:sid, source:'whatsapp',
            client:g(2), whatsapp:g(3), type:t,
            eventDate:g(5), location:g(6), guests:parseInt(g(7))||0,
            proposedValue:parseFloat(g(8))||0, notes:g(9),
            status:'orcamento', paid:false, createdAt:today() });
          ne++;
        });
      }
      if (newEvts.length > 0) setEvents(p => [...newEvts, ...p]);

      const now = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      setLastSync(now); db.set('fp_last_sync',now);
      setSyncMsg({ ok:true, no, ne });
    } catch(err) {
      setSyncMsg({ ok:false, err: err.message || 'Erro desconhecido ao sincronizar.' });
    } finally { setSyncing(false); }
  };

  // ── CLOUD SYNC: load from Firestore on startup ──
  useEffect(() => {
    setCloudStatus('syncing');
    const KS = {
      'fp_trans': setTrans, 'fp_orders': setOrders, 'fp_events': setEvents,
      'fp_products': setProducts, 'fp_contas': setContas,
      'fp_cats_pagar': setCatsPagar, 'fp_unidades': setUnidadesMedida,
      'fp_fornecedores': setFornecedores, 'fp_materias_primas': setMateriasPrimas,
      'fp_clientes': setClientes,
      'fp_estoque_hist': setEstoqueHist, 'fp_sabores': setSabores,
      'fp_cats_receber': setCatsReceber,
      'fp_cats_in': setCatsIn, 'fp_cats_out': setCatsOut,
    };
    const CS = {
      'fp_sheet_id': v => setSheetId(typeof v==='string'?v:''),
      'fp_opening_bal': v => setOpenBal(parseFloat(v)||0),
      // Só sobrescreve o estoque local se a nuvem trouxer um objeto válido E
      // não for mais antigo do que o que este aparelho já tem salvo (ts).
      // Antes, qualquer leitura da nuvem era aplicada sem checar "de quando"
      // ela era — se essa leitura batesse numa versão antiga (cache do
      // Firestore, outro aparelho desatualizado, etc.), o estoque revertia
      // sozinho ao abrir o app, mesmo com uma atualização mais recente feita
      // localmente. Agora compara o horário antes de aplicar.
      'fp_estoque': (v, ts) => {
        if (!(v && typeof v==='object' && !Array.isArray(v))) return;
        const localTs = parseInt(localStorage.getItem('fp_estoque__ts')||'0', 10);
        if (localTs && ts && ts < localTs) return; // nuvem mais antiga — ignora
        setEstoqueData(v);
      },
    };
    Promise.all(Object.keys({...KS,...CS}).map(k => {
      // 'fp_estoque' lê direto do servidor (não do cache offline do SDK) —
      // é justamente o doc mais sensível a uma leitura "antiga" silenciosa.
      const getOpts = k==='fp_estoque' ? {source:'server'} : undefined;
      const req = getOpts ? window.__fsdb.collection('fp_data').doc(k).get(getOpts)
                           : window.__fsdb.collection('fp_data').doc(k).get();
      return req
        .then(d => ({k, v: d.exists ? d.data()?.data : undefined, ts: d.exists ? d.data()?.ts : 0}))
        .catch(() => ({k, v:undefined, ts:0}));
    })).then(res => {
      initDone.current = true;
      res.forEach(({k,v,ts}) => {
        if (v===undefined) return;
        // Para listas (KS), só aplica se a nuvem realmente trouxer um array —
        // um valor corrompido/inesperado não deve apagar os dados locais.
        if (KS[k]) { if (Array.isArray(v)) { try { localStorage.setItem(k,JSON.stringify(v)); } catch {} KS[k](v); } return; }
        try { localStorage.setItem(k,JSON.stringify(v)); } catch {}
        if (CS[k]) CS[k](v, ts);
      });
      setCloudStatus('ok');
      setTimeout(()=>setCloudStatus('idle'), 3000);
    }).catch(()=>{ initDone.current = true; setCloudStatus('error'); });
  }, []);

  // Cardápio orders listener — imports new orders into Pedidos tab
  useEffect(() => {
    const parseDate = s => {
      if (!s) return today();
      const p = s.split('/');
      return p.length===3 ? p[2]+'-'+p[1]+'-'+p[0] : today();
    };
    const playBeep = () => {
      try {
        const ac = new (window.AudioContext||window.webkitAudioContext)();
        [0,150,300].forEach(d=>setTimeout(()=>{
          const o=ac.createOscillator(),g=ac.createGain();
          o.connect(g);g.connect(ac.destination);
          o.frequency.value=880;g.gain.setValueAtTime(0.25,ac.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.3);
          o.start();o.stop(ac.currentTime+0.3);
        },d));
      } catch(e){}
    };
    let unsub;
    try {
      unsub = window.__fsdb.collection('fp_pedidos')
        .where('status','==','novo')
        .onSnapshot(snap => {
          let added = 0;
          let lastCliente = '';
          let lastTotal = 0;
          snap.docChanges().forEach(change => {
            if (change.type !== 'added') return;
            const docId = change.doc.id;
            if (importedCardapioIds.current.has(docId)) return;
            importedCardapioIds.current.add(docId);
            const d = change.doc.data();
            lastCliente = d.cliente || 'Cliente';
            lastTotal   = d.total   || 0;
            const orderItems = (d.itens||[]).map(i=>({
              productId: (i.nome||'').replace(/\s+/g,'_').toLowerCase(),
              productName: i.nome||'',
              qty: i.qty||1,
              unitPrice: i.preco||0,
              cat: 'grande'
            }));
            const newOrder = {
              id: genId(),
              cardapioId: docId,
              client: d.cliente||'Cliente',
              whatsapp: d.whatsapp||'',
              items: orderItems,
              total: d.total||0,
              deliveryDate: parseDate(d.data),
              deliveryAddress: d.local==='delivery'?(d.endereco||''):'Retirada no local',
              notes: (d.obs?'Obs: '+d.obs+' | ':'')+('Horário: '+(d.horario||''))+(d.pagamento?' | Pagto: '+d.pagamento:''),
              status: 'pending',
              paid: false,
              createdAt: today(),
              fromCardapio: true
            };
            setOrders(p => [newOrder,...p]);
            // Estoque só é debitado quando o pedido for confirmado (ver updOrder) —
            // assim os itens só "saem" depois de você revisar e confirmar o pedido.
            window.__fsdb.collection('fp_pedidos').doc(docId).update({status:'importado'}).catch(()=>{});
            added++;
          });
          if (added > 0) {
            setNewCardapioCount(c=>c+added);
            playBeep();
            // Notificação do navegador
            if ('Notification' in window && Notification.permission === 'granted') {
              try {
                const titulo = added === 1
                  ? `🍕 Novo pedido de ${lastCliente}!`
                  : `🍕 ${added} novos pedidos chegaram!`;
                const corpo = added === 1
                  ? `Total: R$ ${lastTotal.toFixed(2).replace('.',',')} — toque para abrir`
                  : 'Toque para ver os pedidos';
                const optsNotif = {
                  body:     corpo,
                  icon:     '/icon-192.png',
                  badge:    '/icon-192.png',
                  tag:      'novo-pedido',
                  renotify: true,
                };
                // Mobile (Chrome Android) exige showNotification via Service Worker
                if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
                  navigator.serviceWorker.ready.then(reg => {
                    reg.showNotification(titulo, optsNotif);
                  }).catch(() => {});
                } else {
                  // Fallback desktop
                  const notif = new Notification(titulo, optsNotif);
                  notif.onclick = () => { window.focus(); notif.close(); };
                }
              } catch(e) {}
            }
          }
        }, ()=>{});
    } catch(e){}
    return ()=>{ try{unsub&&unsub();}catch(e){} };
  }, []);

  // Auto-sync on startup if sheet ID already configured
  useEffect(() => { if (sheetId) syncFromSheets(sheetId); }, []);

  // Auto-sync polling every 3 minutes
  useEffect(() => {
    if (!sheetId) return;
    const id = setInterval(() => syncFromSheets(sheetId), 3 * 60 * 1000);
    return () => clearInterval(id);
  }, [sheetId]);

  const ctx = { trans, orders, events, products, setProducts, addTrans, addOrder, addEvent, updOrder, updEvent, delTrans, paidOrder, unpaidOrder, paidEvent, contas, addConta, updConta, pagarConta, delConta, open, close, setTab, sheetId, setSheetId, syncing, syncFromSheets, lastSync, syncMsg, showCfg, setShowCfg, openBal, setOpenBal, showProds, setShowProds, cloudStatus, newCardapioCount, catsPagar, setCatsPagar, catsReceber, setCatsReceber, catsIn, setCatsIn, catsOut, setCatsOut, unidadesMedida, setUnidadesMedida, fornecedores, addFornecedor, updFornecedor, delFornecedor, clientes, addCliente, updCliente, delCliente, materiasPrimas, addMateriaPrima, updMateriaPrima, delMateriaPrima, estoqueData, estoqueHist, ajustarEstoque, debitarEstoquePedido, reporEstoquePedido, delHistoricoEstoque, sabores, addSabor, updSabor, delSabor, currentUserEmail, onLogout };

  const TABS = [
    {id:'dashboard',   lbl:'Início',   icon:I.home},
    {id:'finance',     lbl:'Finanças', icon:I.cash},
    {id:'orders',      lbl:'Pedidos',  icon:I.bag},
    {id:'events',      lbl:'Eventos',  icon:I.cal},
    {id:'contas',      lbl:'Contas',   icon:I.bill},
    {id:'estoque',     lbl:'Estoque',  icon:I.box},
    {id:'profits',     lbl:'Lucros',   icon:I.coin},
    {id:'whatsapp',    lbl:'WhatsApp', icon:I.wa},
  ];

  const headerAction = () => {
    if (tab==='dashboard'||tab==='finance') return <button onClick={()=>open('add_trans',{type:'entrada'})} style={{background:'rgba(255,255,255,0.18)',border:'1px solid rgba(255,255,255,0.35)',borderRadius:10,color:'white',padding:'8px 13px',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:5,fontFamily:'inherit'}}>{I.plus('white',15)} Lançar</button>;
    if (tab==='orders')  return <button onClick={()=>open('add_order')} style={{background:'rgba(255,255,255,0.18)',border:'1px solid rgba(255,255,255,0.35)',borderRadius:10,color:'white',padding:'8px 13px',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:5,fontFamily:'inherit'}}>{I.plus('white',15)} Pedido</button>;
    if (tab==='events')  return <button onClick={()=>open('add_event')} style={{background:'rgba(255,255,255,0.18)',border:'1px solid rgba(255,255,255,0.35)',borderRadius:10,color:'white',padding:'8px 13px',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:5,fontFamily:'inherit'}}>{I.plus('white',15)} Evento</button>;
    if (tab==='contas')  return <button onClick={()=>open('add_conta')} style={{background:'rgba(255,255,255,0.18)',border:'1px solid rgba(255,255,255,0.35)',borderRadius:10,color:'white',padding:'8px 13px',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:5,fontFamily:'inherit'}}>{I.plus('white',15)} Conta</button>;
    return null;
  };

  return (
    <div style={{paddingBottom:80, minHeight:'100vh'}}>

      {/* ── HEADER ── */}
      <div style={{background:`linear-gradient(135deg, ${C.red} 0%, ${C.red2} 100%)`, padding:'16px 18px 14px', position:'sticky', top:0, zIndex:50, boxShadow:'0 4px 20px rgba(200,37,24,0.25)'}}>
        <div style={{display:'flex', alignItems:'center', gap:10}}>
          <Logo size="header"/>
          <div style={{marginLeft:'auto',display:'flex',gap:8,alignItems:'center'}}>
            {headerAction()}
            {cloudStatus!=='idle' && (
              <div style={{display:'flex',alignItems:'center',gap:4,padding:'6px 10px',borderRadius:10,background:'rgba(255,255,255,0.15)',border:'1px solid rgba(255,255,255,0.25)'}}>
                {cloudStatus==='syncing' && <><span style={{width:8,height:8,borderRadius:'50%',background:'#fbbf24',display:'inline-block',animation:'pulse 1s infinite'}}/>
                  <span style={{fontSize:11,color:'rgba(255,255,255,0.9)',fontWeight:700}}>Sync...</span></>}
                {cloudStatus==='ok' && <><span style={{fontSize:13}}>☁️</span>
                  <span style={{fontSize:11,color:'#86efac',fontWeight:700}}>Salvo</span></>}
                {cloudStatus==='error' && <><span style={{fontSize:13}}>⚠️</span>
                  <span style={{fontSize:11,color:'#fca5a5',fontWeight:700}}>Offline</span></>}
              </div>
            )}
            {notifPerm === 'default' && (
              <button title="Ativar notificações de pedidos"
                onClick={ativarPushOneSignal}
                style={{background:'rgba(255,255,255,0.18)',border:'1px solid rgba(255,255,255,0.35)',borderRadius:10,color:'white',padding:'8px 10px',cursor:'pointer',fontFamily:'inherit',fontSize:15}}>
                🔔
              </button>
            )}
            {notifPerm === 'denied' && (
              <span title="Notificações bloqueadas — libere nas configurações do navegador"
                style={{fontSize:15,opacity:0.5,cursor:'help'}}>🔕</span>
            )}
            <button onClick={()=>setShowCfg(true)} title="Configurações" style={{background:'rgba(255,255,255,0.18)',border:'1px solid rgba(255,255,255,0.35)',borderRadius:10,color:'white',padding:'8px 10px',cursor:'pointer',display:'flex',alignItems:'center',fontFamily:'inherit',position:'relative'}}>
              {I.gear('white',17)}
              {sheetId&&syncing&&<span style={{position:'absolute',top:-3,right:-3,width:8,height:8,borderRadius:'50%',background:'#f59e0b'}}/>}
            </button>
            <button onClick={()=>{if(window.confirm('Sair do sistema?')) onLogout();}} title="Sair"
              style={{background:'rgba(255,255,255,0.12)',border:'1px solid rgba(255,255,255,0.25)',borderRadius:10,color:'rgba(255,255,255,0.75)',padding:'8px 10px',cursor:'pointer',display:'flex',alignItems:'center',fontFamily:'inherit',fontSize:16}}>
              ⏏
            </button>
          </div>
        </div>
      </div>

      {/* ── VENCIDOS BANNER ── */}
      <VencidosBanner ctx={ctx} alertKey={alertKey} setAlertKey={setAlertKey} setTab={setTab}/>

      {/* ── CONTENT ── */}
      <div style={{padding:'16px 14px'}}>
        {tab==='dashboard'   && <Dashboard   ctx={ctx}/>}
        {tab==='finance'     && <Finance     ctx={ctx}/>}
        {tab==='orders'      && <Orders      ctx={ctx}/>}
        {tab==='events'      && <Events      ctx={ctx}/>}
        {tab==='profits'     && <Lucros      ctx={ctx}/>}
        {tab==='contas'      && <Contas      ctx={ctx}/>}
        {tab==='estoque'     && <Estoque     ctx={ctx}/>}
        {tab==='whatsapp'    && <WhatsApp    ctx={ctx}/>}
      </div>

      {/* ── TAB BAR ── */}
      <div className="tabbar">
        {TABS.map(t=>{
          const isContas     = t.id==='contas';
          const isOrders     = t.id==='orders';
          const cVenc        = isContas  ? ctx.contas.filter(c=>!c.pago&&c.vencimento&&c.vencimento<today()).length : 0;
          const ordersBadge  = isOrders  ? ctx.newCardapioCount : 0;
          const badgeVal     = isContas  ? cVenc : ordersBadge;
          return (
            <div key={t.id} className="tab" onClick={()=>{ setTab(t.id); if(t.id==='orders') setNewCardapioCount(0); }} style={{position:'relative'}}>
              {t.icon(tab===t.id ? C.red : '#bbb', 22)}
              {badgeVal>0 && (
                <span style={{position:'absolute',top:2,right:14,background:'#b91c1c',color:'white',borderRadius:'50%',width:16,height:16,fontSize:9,fontWeight:900,display:'flex',alignItems:'center',justifyContent:'center',border:'2px solid var(--cream)'}}>
                  {badgeVal>9?'9+':badgeVal}
                </span>
              )}
              <span className="tab-lbl" style={{color:tab===t.id?C.red:'#bbb'}}>{t.lbl}</span>
            </div>
          );
        })}
      </div>

      {modal==='add_trans'  && <TransModal   ctx={ctx} initType={mData?.type}/>}
      {modal==='add_order'  && <OrderModal   ctx={ctx}/>}
      {modal==='add_event'  && <EventModal   ctx={ctx} event={mData}/>}
      {modal==='add_conta'  && <ContaModal   ctx={ctx} initTipo={mData?.tipo||'receber'} conta={mData?.id?mData:null}/>}
      {modal==='pagar_conta' && <PagamentoModal ctx={ctx} conta={mData}/>}
      {modal==='view_order' && <OrderDetail  ctx={ctx} order={mData}/>}
      {modal==='view_event' && <EventDetail  ctx={ctx} event={mData}/>}
      {showCfg              && <SettingsModal  ctx={ctx}/>}
      {showProds            && <ProductsModal  ctx={ctx}/>}
    </div>
  );
}


// ── VENCIDOS BANNER ──────────────────────────────────────────────────────────
function VencidosBanner({ ctx, alertKey, setAlertKey, setTab }) {
  const tod = today();
  const vencR = ctx.contas.filter(c => c.tipo==='receber' && !c.pago && c.vencimento && c.vencimento < tod);
  const vencP = ctx.contas.filter(c => c.tipo==='pagar'   && !c.pago && c.vencimento && c.vencimento < tod);
  const total = vencR.length + vencP.length;
  if (total === 0) return null;

  const todKey = 'dismissed_' + tod;
  if (alertKey === todKey) return null;

  const totR = vencR.reduce((s,c)=>s+c.valor, 0);
  const totP = vencP.reduce((s,c)=>s+c.valor, 0);

  const buildWaMsg = () => {
    let msg = `🔔 *Fino Palastro – Contas Vencidas (${fmtDate(tod)})*\n\n`;
    if (vencR.length > 0) {
      msg += `📥 *A RECEBER (${vencR.length}):*\n`;
      vencR.forEach(c => { msg += `• ${c.descricao}${c.cliente?' – '+c.cliente:''}: ${fmtBRL(c.valor)} (venc. ${fmtDate(c.vencimento)})\n`; });
      msg += `*Total: ${fmtBRL(totR)}*\n\n`;
    }
    if (vencP.length > 0) {
      msg += `📤 *A PAGAR (${vencP.length}):*\n`;
      vencP.forEach(c => { msg += `• ${c.descricao}${c.cliente?' – '+c.cliente:''}: ${fmtBRL(c.valor)} (venc. ${fmtDate(c.vencimento)})\n`; });
      msg += `*Total: ${fmtBRL(totP)}*\n`;
    }
    return msg;
  };

  const openWA = () => {
    const msg = encodeURIComponent(buildWaMsg());
    window.open(`https://wa.me/5548991307102?text=${msg}`, '_blank');
  };

  return (
    <div style={{margin:'8px 14px 4px',background:'linear-gradient(135deg,#7f1d1d,#b91c1c)',borderRadius:16,padding:'14px 16px',boxShadow:'0 4px 18px rgba(185,28,28,0.35)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:20}}>&#x1F534;</span>
          <div>
            <div style={{color:'white',fontWeight:800,fontSize:14,lineHeight:1.2}}>
              {total} conta{total>1?'s':''} vencida{total>1?'s':''}
            </div>
            <div style={{color:'rgba(255,255,255,0.75)',fontSize:12,marginTop:2}}>
              {vencR.length>0 && `Receber: ${fmtBRL(totR)}`}
              {vencR.length>0 && vencP.length>0 && ' · '}
              {vencP.length>0 && `Pagar: ${fmtBRL(totP)}`}
            </div>
          </div>
        </div>
        <button onClick={()=>setAlertKey(todKey)}
          style={{background:'rgba(255,255,255,0.15)',border:'none',borderRadius:8,color:'white',padding:'4px 8px',cursor:'pointer',fontSize:13,fontFamily:'inherit'}}>
          &#x2715;
        </button>
      </div>
      <div style={{display:'flex',gap:8}}>
        <button onClick={()=>setTab('contas')}
          style={{flex:1,background:'rgba(255,255,255,0.18)',border:'1px solid rgba(255,255,255,0.35)',borderRadius:10,color:'white',padding:'9px 0',fontWeight:700,fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>
          Ver Contas
        </button>
        <button onClick={openWA}
          style={{flex:1,background:'#25D366',border:'none',borderRadius:10,color:'white',padding:'9px 0',fontWeight:700,fontSize:13,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>
          {I.wa('white',15)} Enviar Resumo
        </button>
      </div>
    </div>
  );
}

// ── DASHBOARD ──────────────────────────────────────────────────────────

  const dayIn = dayT.filter(t=>t.type==='entrada').reduce((s,t)=>s+t.amount,0);
  const dayOut= dayT.filter(t=>t.type==='saida')  .reduce((s,t)=>s+t.amount,0);
  const allIn = ctx.trans.filter(t=>t.type==='entrada').reduce((s,t)=>s+t.amount,0);
  const allOut= ctx.trans.filter(t=>t.type==='saida'  ).reduce((s,t)=>s+t.amount,0);

  const wkAgo  = (()=>{ const d=new Date(); d.setDate(d.getDate()-6); return d.toISOString().split('T')[0]; })();

            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>

          <div key={o.id} className="card" onClick={()=>ctx.open('view_order',o)} style={{cursor:'pointer',marginBottom:8}}>

                <div style={{fontWeight:700,fontSize:15}}>{o.client}</div>

  );
}

// ── FINANCE ─────────────────────────────────────────────────────────────
function Finance({ ctx }) {
  const [period, setPeriod] = useState('month');
  const [typeF,  setTypeF]  = useState('all');
  const isReports = period === 'reports';
  const now = new Date();
  const cuts = {
    today: today(),
    week:  (()=>{ const d=new Date(); d.setDate(d.getDate()-6); return d.toISOString().split('T')[0]; })(),
    month: `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`,
  };
  const list   = isReports ? [] : ctx.trans.filter(t=>t.date>=cuts[period]&&(typeF==='all'||t.type===typeF)).sort((a,b)=>b.date>a.date?1:-1);
  const totIn  = list.filter(t=>t.type==='entrada').reduce((s,t)=>s+t.amount,0);
  const totOut = list.filter(t=>t.type==='saida'  ).reduce((s,t)=>s+t.amount,0);
  const bal    = totIn-totOut;
  const catMap = {};
  list.forEach(t=>{ if(!catMap[t.category])catMap[t.category]={in:0,out:0}; catMap[t.category][t.type==='entrada'?'in':'out']+=t.amount; });

  const chips = [['today','Hoje'],['week','7 dias'],['month','Mês'],['reports','📊 Relatórios']];

  return (
    <div>
      <div className="scroll-row" style={{marginBottom:14}}>
        {chips.map(([k,l])=>(
          <button key={k} className="chip" onClick={()=>setPeriod(k)}
            style={{background:period===k?C.red:'white',color:period===k?'white':C.text2,border:`1px solid ${period===k?C.red:C.border}`,fontSize:period==='reports'&&k==='reports'?12:13}}>
            {l}
          </button>
        ))}
      </div>

      {isReports ? <RelatoriosView ctx={ctx}/> : (
        <div>
          {/* Summary */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:14}}>
            {[['ENTRADAS',totIn,C.green],['SAÍDAS',totOut,C.red],['SALDO',bal,bal>=0?C.green:C.red]].map(([l,v,c])=>(
              <div key={l} className="card" style={{padding:'12px 10px',textAlign:'center'}}>
                <div style={{fontSize:9,color:C.text2,fontWeight:700,letterSpacing:'0.5px',marginBottom:4}}>{l}</div>
                <div style={{fontSize:13,fontWeight:900,color:c}}>{fmtBRL(v)}</div>
              </div>
            ))}
          </div>

          {/* Opening balance */}
          {ctx.openBal>0&&(
            <div style={{background:'#eff6ff',borderRadius:12,padding:'10px 14px',marginBottom:14,border:'1px solid #bfdbfe',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontSize:12,color:'#1e40af',fontWeight:700}}>💰 Saldo de Abertura</div>
                <div style={{fontSize:10,color:'#3b82f6',marginTop:1}}>registrado antes de usar o app</div>
              </div>
              <span style={{fontSize:15,fontWeight:800,color:'#1d4ed8'}}>{fmtBRL(ctx.openBal)}</span>
            </div>
          )}

          {/* Category breakdown */}
          {Object.keys(catMap).length>0&&(
            <div className="card" style={{marginBottom:14}}>
              <div className="section-label">Por Categoria</div>
              {Object.entries(catMap).map(([cat,vals])=>(
                <div key={cat} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:`1px solid ${C.border}`}}>
                  <div style={{fontSize:13,fontWeight:600}}>{cat}</div>
                  <div style={{textAlign:'right'}}>
                    {vals.in >0&&<div style={{fontSize:12,color:C.green,fontWeight:700}}>↑ {fmtBRL(vals.in)}</div>}
                    {vals.out>0&&<div style={{fontSize:12,color:C.red,  fontWeight:700}}>↓ {fmtBRL(vals.out)}</div>}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Type filter */}
          <div style={{display:'flex',gap:8,marginBottom:14}}>
            {[['all','Todos'],['entrada','Entradas'],['saida','Saídas']].map(([k,l])=>(
              <button key={k} className="chip" onClick={()=>setTypeF(k)} style={{background:typeF===k?C.text:'white',color:typeF===k?'white':C.text2,border:`1px solid ${typeF===k?C.text:C.border}`}}>{l}</button>
            ))}
          </div>

          {list.length===0?(
            <div style={{textAlign:'center',padding:'40px 20px',color:C.text2}}>
              <div style={{fontSize:36,marginBottom:10}}>📋</div>
              <div style={{fontWeight:600}}>Nenhum lançamento neste período</div>
            </div>
          ):list.map(t=>(
            <div key={t.id} className="card" style={{display:'flex',alignItems:'center',gap:12,marginBottom:8,padding:'13px 14px'}}>
              <div style={{width:42,height:42,borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',background:t.type==='entrada'?'#f0fdf4':'#fff5f5',flexShrink:0,fontSize:18,fontWeight:800,color:t.type==='entrada'?C.green:C.red}}>
                {t.type==='entrada'?'↑':'↓'}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.description||t.category}</div>
                <div style={{fontSize:11,color:C.text2,marginTop:2}}>{t.category} · {fmtDate(t.date)} · {t.paymentMethod}</div>
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <div style={{fontWeight:800,fontSize:14,color:t.type==='entrada'?C.green:C.red}}>{t.type==='entrada'?'+':'-'}{fmtBRL(t.amount)}</div>
                <button onClick={()=>ctx.delTrans(t.id)} style={{background:'none',border:'none',cursor:'pointer',padding:'3px 0',marginTop:1}}>{I.trash('#d4c8bc',14)}</button>
              </div>
            </div>
          ))}
        </div>
      )}

      <div style={{position:'fixed',bottom:90,right:16,display:'flex',flexDirection:'column',gap:10,zIndex:90}}>
        <button onClick={()=>ctx.open('add_trans',{type:'saida'})} style={{width:46,height:46,borderRadius:'50%',background:C.red,color:'white',border:'none',cursor:'pointer',fontSize:18,fontWeight:800,boxShadow:'0 4px 16px rgba(200,37,24,0.4)'}}>↓</button>
        <button onClick={()=>ctx.open('add_trans',{type:'entrada'})} style={{width:46,height:46,borderRadius:'50%',background:C.green,color:'white',border:'none',cursor:'pointer',fontSize:18,fontWeight:800,boxShadow:'0 4px 16px rgba(42,125,79,0.35)'}}>↑</button>
      </div>
    </div>
  );
}

// ── MODAL: TRANSACTION ────────────────────────────────────────────────────
function TransModal({ ctx, initType='entrada' }) {
  const [type,setType]=useState(initType);
  const [amt, setAmt] =useState('');
  const [cat, setCat] =useState('');
  const [desc,setDesc]=useState('');
  const [pay, setPay] =useState('Pix');
  const [date,setDate]=useState(today());
  const [items,setItems]=useState([{productId:'',productName:'',cat:'grande',qty:1}]);
  const [novaCat,   setNovaCat]   = useState('');
  const [addingCat, setAddingCat] = useState(false);
  const cats=type==='entrada'?ctx.catsIn:ctx.catsOut;
  const accent = type==='entrada'?C.green:C.red;
  const precisaPizzas = type==='entrada' && (cat==='Venda Congelada' || cat==='Evento Express');
  const addCat = () => {
    const c = novaCat.trim();
    if (!c || cats.includes(c)) return;
    if (type==='entrada') ctx.setCatsIn(p=>[...p, c]);
    else ctx.setCatsOut(p=>[...p, c]);
    setCat(c);
    setNovaCat('');
    setAddingCat(false);
  };
  const removeCat = (c) => {
    const defaults = type==='entrada'?CATS_IN_DEFAULT:CATS_OUT_DEFAULT;
    if (defaults.includes(c)) return; // não remove padrão
    if (type==='entrada') ctx.setCatsIn(p=>p.filter(x=>x!==c));
    else ctx.setCatsOut(p=>p.filter(x=>x!==c));
    if (cat===c) setCat('');
  };
  const addItem = c => setItems(p=>[...p,{productId:'',productName:'',cat:c,qty:1}]);
  const updItem = (idx,k,v) => setItems(p=>p.map((it,i)=>{
    if(i!==idx) return it;
    if(k==='productId'){
      const pr = ctx.sabores.find(s=>s.id===v);
      return pr ? {...it,productId:pr.id,productName:pr.nome,cat:pr.cat} : {...it,productId:v};
    }
    return {...it,[k]:k==='qty'?Math.max(1,parseInt(v)||1):v};
  }));
  const save=()=>{
    if(!amt||!cat)return;
    const itensVendidos = precisaPizzas ? items.filter(i=>i.productId) : [];
    ctx.addTrans({type,amount:parseFloat(amt),category:cat,description:desc,paymentMethod:pay,date,itens:itensVendidos});
    if (itensVendidos.length) ctx.debitarEstoquePedido(itensVendidos);
    ctx.close();
  };

  return (
    <div className="overlay" onClick={ctx.close}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div style={{fontSize:19,fontWeight:800}}>Novo Lançamento</div>
          <button onClick={ctx.close} style={{background:'none',border:'none',cursor:'pointer'}}>{I.x('#bbb',24)}</button>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:20}}>
          {[['entrada','↑ Entrada',C.green,'#f0fdf4'],['saida','↓ Saída',C.red,'#fff5f5']].map(([k,l,tc,bg])=>(
            <button key={k} onClick={()=>{setType(k);setCat('');}} style={{padding:14,borderRadius:14,border:`2px solid ${type===k?tc:C.border}`,background:type===k?bg:'white',fontWeight:800,cursor:'pointer',color:type===k?tc:'#bbb',fontSize:15,fontFamily:'inherit'}}>{l}</button>
          ))}
        </div>

        <div style={{textAlign:'center',padding:'18px 12px',background:'#faf5ee',borderRadius:16,marginBottom:20,border:`1px solid ${C.border}`}}>
          <div style={{fontSize:11,color:C.text2,fontWeight:700,letterSpacing:'0.5px',marginBottom:4}}>VALOR (R$)</div>
          <input type="number" inputMode="decimal" placeholder="0,00" value={amt} onChange={e=>setAmt(e.target.value)}
            style={{fontSize:40,fontWeight:900,border:'none',outline:'none',background:'transparent',textAlign:'center',width:'100%',color:type==='entrada'?C.green:C.red,fontFamily:'inherit'}}/>
        </div>

        <label className="label" style={{marginBottom:6}}>Categoria
          <button onClick={()=>setAddingCat(v=>!v)} style={{marginLeft:8,fontSize:11,background:'transparent',border:`1px solid ${C.border}`,borderRadius:8,padding:'2px 8px',cursor:'pointer',color:C.text2}}>{addingCat?'Cancelar':'+ Nova'}</button>
        </label>
        {addingCat&&(
          <div style={{display:'flex',gap:6,marginBottom:8}}>
            <input className="input" placeholder="Nome da categoria" value={novaCat} onChange={e=>setNovaCat(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&addCat()} style={{flex:1,marginBottom:0}}/>
            <button onClick={addCat} style={{background:accent,border:'none',borderRadius:10,color:'white',padding:'0 14px',fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>OK</button>
          </div>
        )}
        <div style={{display:'flex',flexWrap:'wrap',gap:7,marginBottom:16}}>
          {cats.map(c=>(
            <div key={c} style={{display:'flex',alignItems:'center',gap:2}}>
              <button onClick={()=>setCat(c)} style={{padding:'8px 13px',borderRadius:20,border:'none',cursor:'pointer',fontSize:13,fontWeight:600,background:cat===c?accent:'#f0ebe4',color:cat===c?'white':C.brown,fontFamily:'inherit'}}>{c}</button>
              {!(type==='entrada'?CATS_IN_DEFAULT:CATS_OUT_DEFAULT).includes(c)&&(
                <button onClick={()=>removeCat(c)} style={{background:'transparent',border:'none',cursor:'pointer',color:'#ccc',fontSize:14,padding:'0 2px',lineHeight:1}}>×</button>
              )}
            </div>
          ))}
        </div>

        {precisaPizzas && (
          <div style={{marginBottom:16}}>
            <label className="label">Pizzas vendidas (serão retiradas do estoque)</label>
            {items.map((item,idx)=>(
              <div key={idx} style={{display:'flex',gap:6,alignItems:'center',marginBottom:8}}>
                <select className="input" style={{flex:1,padding:'10px 8px'}} value={item.productId} onChange={e=>updItem(idx,'productId',e.target.value)}>
                  <option value="">Selecionar...</option>
                  <optgroup label="Grandes">
                    {ctx.sabores.filter(p=>p.cat==='grande').map(p=><option key={p.id} value={p.id}>{p.nome}</option>)}
                  </optgroup>
                  <optgroup label="Mini">
                    {ctx.sabores.filter(p=>p.cat==='mini').map(p=><option key={p.id} value={p.id}>{p.nome}</option>)}
                  </optgroup>
                  <optgroup label="Doces">
                    {ctx.sabores.filter(p=>p.cat==='doce').map(p=><option key={p.id} value={p.id}>{p.nome}</option>)}
                  </optgroup>
                </select>
                <input className="input" type="number" min="1" style={{width:56,padding:'10px 8px',textAlign:'center'}} value={item.qty} onChange={e=>updItem(idx,'qty',e.target.value)}/>
                {items.length>1&&<button onClick={()=>setItems(items.filter((_,i)=>i!==idx))} style={{background:'none',border:'none',cursor:'pointer',flexShrink:0}}>{I.x(C.red,20)}</button>}
              </div>
            ))}

              <button onClick={()=>addItem('mini')}   style={{background:'#fffbeb',border:`1px solid #fde68a`,borderRadius:10,padding:'8px 12px',fontSize:12,fontWeight:700,cursor:'pointer',color:'#b45309',fontFamily:'inherit'}}>+ Mini</button>
              <button onClick={()=>addItem('doce')}   style={{background:'#f5f0ff',border:`1px solid #d8b4fe`,borderRadius:10,padding:'8px 12px',fontSize:12,fontWeight:700,cursor:'pointer',color:'#7e22ce',fontFamily:'inherit'}}>+ Doce</button>

// ── MODAL: ORDER ──────────────────────────────────────────────────────────
function OrderModal({ ctx }) {
  // Sabores e preços vêm direto do Estoque (ctx.sabores), para ficar sempre
  // igual ao que está cadastrado no sistema — evita listas/preços divergentes.
  const grandes = ctx.sabores.filter(p=>p.cat==='grande');
  const minis   = ctx.sabores.filter(p=>p.cat==='mini');
  const doces   = ctx.sabores.filter(p=>p.cat==='doce');
  const allProds= ctx.sabores;

  const [client,  setClient]  = useState('');
  const [wa,      setWa]      = useState('');
  const [items,   setItems]   = useState([{productId:allProds[0]?.id,productName:allProds[0]?.nome,qty:1,unitPrice:allProds[0]?.preco||0,cat:allProds[0]?.cat}]);
  const [delDate, setDelDate] = useState('');
  const [addr,    setAddr]    = useState('');
  const [notes,   setNotes]   = useState('');
  const [showClienteSugg, setShowClienteSugg] = useState(false);

  const total=items.reduce((s,i)=>s+(i.qty*i.unitPrice),0);

  // Sugestões a partir dos clientes já cadastrados (aba Clientes, no Estoque)
  const clientesFiltrados = (ctx.clientes||[])
    .filter(c=>c.nome.toLowerCase().includes(client.toLowerCase()))
    .slice(0,8);
  const selecionarCliente = (c) => {
    setClient(c.nome);
    if (c.whatsapp) setWa(c.whatsapp);
    if (c.endereco) setAddr(c.endereco);
    setShowClienteSugg(false);
  };

  const updItem=(idx,field,val)=>{
    const n=[...items];
    if(field==='productId'){const p=allProds.find(p=>p.id===val);n[idx]={...n[idx],productId:val,productName:p?.nome,unitPrice:p?.preco||0,cat:p?.cat};}
    else if(field==='qty')n[idx]={...n[idx],qty:Math.max(1,parseInt(val)||1)};
    else if(field==='unitPrice')n[idx]={...n[idx],unitPrice:parseFloat(String(val).replace(',','.'))||0};
    setItems(n);
  };
  const addItem=(cat)=>{
    const src=cat==='grande'?grandes:cat==='mini'?minis:doces;
    setItems([...items,{productId:src[0]?.id,productName:src[0]?.nome,qty:1,unitPrice:src[0]?.preco||0,cat}]);
  };
  const save=()=>{ if(!client)return; ctx.addOrder({client,whatsapp:wa,items,deliveryDate:delDate,deliveryAddress:addr,notes,total,status:'pending',paid:false}); ctx.close(); };

  return (
    <div className="overlay" onClick={ctx.close}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div style={{fontSize:19,fontWeight:800}}>Novo Pedido</div>
          <button onClick={ctx.close} style={{background:'none',border:'none',cursor:'pointer'}}>{I.x('#bbb',24)}</button>
        </div>

        <label className="label">Nome do cliente *</label>
        <div style={{position:'relative',marginBottom:14}}>
          <input className="input" placeholder="Nome completo ou selecione cadastrado" value={client}
            onChange={e=>{setClient(e.target.value);setShowClienteSugg(true);}}
            onFocus={()=>setShowClienteSugg(true)}
            onBlur={()=>setTimeout(()=>setShowClienteSugg(false),150)}
            style={{marginBottom:0}}/>
          {showClienteSugg && clientesFiltrados.length>0 && (
            <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,right:0,background:'white',border:`1px solid ${C.border}`,borderRadius:12,boxShadow:'0 8px 20px rgba(0,0,0,0.12)',zIndex:20,maxHeight:180,overflowY:'auto'}}>
              {clientesFiltrados.map((c,i)=>(
                <div key={c.id} onClick={()=>selecionarCliente(c)}
                  style={{padding:'10px 14px',fontSize:14,cursor:'pointer',borderBottom:i<clientesFiltrados.length-1?`1px solid ${C.border}`:'none'}}>
                  <div style={{fontWeight:600}}>{c.nome}</div>
                  {c.whatsapp&&<div style={{fontSize:11,color:C.text2}}>{c.whatsapp}</div>}
                </div>
              ))}
            </div>
          )}
        </div>

        <label className="label">WhatsApp</label>
        <input className="input" type="tel" inputMode="tel" style={{marginBottom:16}} placeholder="(11) 99999-9999" value={wa} onChange={e=>setWa(e.target.value)}/>

        <label className="label">Pizzas</label>
        {items.map((item,idx)=>(
          <div key={idx} style={{display:'flex',gap:8,marginBottom:8,alignItems:'center',flexWrap:'wrap'}}>
            <div style={{flexShrink:0,width:58,textAlign:'center',fontSize:10,fontWeight:700,padding:'4px 6px',borderRadius:8,
              background:item.cat==='grande'?'#fff5f5':item.cat==='mini'?'#fffbeb':'#f5f0ff',
              color:item.cat==='grande'?C.red:item.cat==='mini'?'#b45309':'#7e22ce',
              border:`1px solid ${item.cat==='grande'?'#fca5a5':item.cat==='mini'?'#fde68a':'#d8b4fe'}`}}>
              {item.cat==='grande'?'GRANDE':item.cat==='mini'?'MINI':'DOCE'}
            </div>
            <select className="input" style={{flex:'1 1 160px',padding:'10px 12px'}} value={item.productId} onChange={e=>updItem(idx,'productId',e.target.value)}>
              <optgroup label="Pizzas Grandes (30cm)">
                {grandes.map(p=><option key={p.id} value={p.id}>{p.nome} – {fmtBRL(p.preco)}</option>)}
              </optgroup>
              <optgroup label="Mini Pizzas">
                {minis.map(p=><option key={p.id} value={p.id}>{p.nome} – {fmtBRL(p.preco)}</option>)}
              </optgroup>
              {doces.length>0&&(
                <optgroup label="Doces">
                  {doces.map(p=><option key={p.id} value={p.id}>{p.nome} – {fmtBRL(p.preco)}</option>)}
                </optgroup>
              )}
            </select>
            <input className="input" type="number" inputMode="decimal" min="0" step="0.01" title="Valor unitário para este pedido (pode ser diferente do preço padrão)"
              style={{width:78,padding:'10px 8px',textAlign:'center'}} value={item.unitPrice} onChange={e=>updItem(idx,'unitPrice',e.target.value)}/>
            <input className="input" type="number" min="1" style={{width:50,padding:'10px 8px',textAlign:'center'}} value={item.qty} onChange={e=>updItem(idx,'qty',e.target.value)}/>
            {items.length>1&&<button onClick={()=>setItems(items.filter((_,i)=>i!==idx))} style={{background:'none',border:'none',cursor:'pointer',flexShrink:0}}>{I.x(C.red,20)}</button>}
          </div>
        ))}
        <div style={{fontSize:11,color:C.text2,marginTop:-4,marginBottom:12}}>Valor unitário editável — mude se este pedido tiver um preço diferente do padrão.</div>

        <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
          <button onClick={()=>addItem('grande')} style={{background:'#fff5f5',border:`1px solid #fca5a5`,borderRadius:10,padding:'9px 14px',fontSize:12,fontWeight:700,cursor:'pointer',color:C.red,fontFamily:'inherit'}}>+ Grande</button>
          <button onClick={()=>addItem('mini')}   style={{background:'#fffbeb',border:`1px solid #fde68a`,borderRadius:10,padding:'9px 14px',fontSize:12,fontWeight:700,cursor:'pointer',color:'#b45309',fontFamily:'inherit'}}>+ Mini</button>
          {doces.length>0&&<button onClick={()=>addItem('doce')} style={{background:'#f5f0ff',border:`1px solid #d8b4fe`,borderRadius:10,padding:'9px 14px',fontSize:12,fontWeight:700,cursor:'pointer',color:'#7e22ce',fontFamily:'inherit'}}>+ Doce</button>}
        </div>

        <div style={{background:'#f0fdf4',borderRadius:14,padding:'13px 16px',marginBottom:16,display:'flex',justifyContent:'space-between',alignItems:'center',border:`1px solid #bbf7d0`}}>
          <span style={{fontWeight:700,color:C.text2}}>Total do Pedido</span>
          <span style={{fontWeight:900,color:C.green,fontSize:22}}>{fmtBRL(total)}</span>
        </div>

        <label className="label">Data de Entrega</label>
        <input className="input" type="date" style={{marginBottom:14}} value={delDate} onChange={e=>setDelDate(e.target.value)}/>

        <label className="label">Endereço</label>
        <input className="input" style={{marginBottom:14}} placeholder="Rua, nº, bairro" value={addr} onChange={e=>setAddr(e.target.value)}/>

        <label className="label">Observações</label>
        <textarea className="input" style={{marginBottom:22,height:70,resize:'none'}} placeholder="Troco, horário, etc." value={notes} onChange={e=>setNotes(e.target.value)}/>

        <button className="btn-primary" onClick={save} disabled={!client}>Salvar Pedido</button>
      </div>
    </div>
  );
}

// ── MODAL: EVENT ────────────────────────────────────────────────────────────
function EventModal({ ctx, event }) {
  const editing = !!event;
  const [type,  setType]  =useState(event?.type || 'ao_vivo');
  const [client,setClient]=useState(event?.client || '');
  const [wa,    setWa]    =useState(event?.whatsapp || '');
  const [date,  setDate]  =useState(event?.eventDate || '');
  const [loc,   setLoc]   =useState(event?.location || '');
  const [guests,setGuests]=useState(event?.guests ? String(event.guests) : '');
  const [val,   setVal]   =useState(event?.proposedValue ? String(event.proposedValue) : '');
  const [notes, setNotes] =useState(event?.notes || '');
  const [items, setItems] =useState(event?.items?.length ? event.items.map(i=>({...i})) : [{productId:'',productName:'',cat:'grande',price:0,qty:1}]);
  const addItem = cat => setItems(p=>[...p,{productId:'',productName:'',cat,price:0,qty:1}]);
  const updItem = (idx,k,v) => setItems(p=>p.map((it,i)=>{
    if(i!==idx) return it;
    if(k==='productId'){
      const pr = ctx.sabores.find(p=>p.id===v);
      return pr ? {...it,productId:pr.id,productName:pr.nome,price:pr.preco,cat:pr.cat} : {...it,productId:v};
    }
    return {...it,[k]:k==='qty'?Math.max(1,parseInt(v)||1):v};
  }));
  const save=()=>{
    if(!client||!val)return;
    const dados = {type,client,whatsapp:wa,eventDate:date,location:loc,guests:parseInt(guests)||0,proposedValue:parseFloat(val),notes,items:type==='express'?items.filter(i=>i.productId):[]};
    if (editing) ctx.updEvent(event.id, dados);
    else ctx.addEvent({...dados,status:'orcamento',paid:false});
    ctx.close();
  };

  return (
    <div className="overlay" onClick={ctx.close}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div style={{fontSize:19,fontWeight:800}}>{editing?'Editar Evento':'Novo Evento'}</div>
          <button onClick={ctx.close} style={{background:'none',border:'none',cursor:'pointer'}}>{I.x('#bbb',24)}</button>
        </div>

        <label className="label">Tipo de Evento</label>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
          {[['ao_vivo','🔥 Ao Vivo',C.red,'#fff5f5'],['express','⚡ Express','#b45309','#fffbeb']].map(([k,l,tc,bg])=>(
            <button key={k} onClick={()=>setType(k)} style={{padding:14,borderRadius:14,border:`2px solid ${type===k?tc:C.border}`,background:type===k?bg:'white',fontWeight:800,cursor:'pointer',color:type===k?tc:'#bbb',fontSize:14,fontFamily:'inherit'}}>{l}</button>
          ))}
        </div>

        <label className="label">Nome / Empresa *</label>
        <input className="input" style={{marginBottom:14}} placeholder="Nome do cliente" value={client} onChange={e=>setClient(e.target.value)}/>

        <label className="label">WhatsApp</label>
        <input className="input" type="tel" inputMode="tel" style={{marginBottom:14}} placeholder="(11) 99999-9999" value={wa} onChange={e=>setWa(e.target.value)}/>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
          <div><label className="label">Data do Evento</label><input className="input" type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
          <div><label className="label">Nº de Pessoas</label><input className="input" type="number" placeholder="Ex: 30" value={guests} onChange={e=>setGuests(e.target.value)}/></div>
        </div>

        <label className="label">Local</label>
        <input className="input" style={{marginBottom:14}} placeholder="Cidade, bairro ou endereço" value={loc} onChange={e=>setLoc(e.target.value)}/>

        <label className="label">Valor do Orçamento (R$) *</label>
        <input className="input" type="number" inputMode="decimal" style={{marginBottom:14}} placeholder="0,00" value={val} onChange={e=>setVal(e.target.value)}/>

        {type==='express'&&(
          <div style={{marginBottom:16}}>
            <label className="label">Pizzas do Evento (sabores)</label>
            {items.map((item,idx)=>(
              <div key={idx} style={{display:'flex',gap:6,alignItems:'center',marginBottom:8}}>
                <select className="input" style={{flex:1,padding:'10px 8px'}} value={item.productId} onChange={e=>updItem(idx,'productId',e.target.value)}>
                  <option value="">Selecionar...</option>
                  <optgroup label="Grandes">
                    {ctx.sabores.filter(p=>p.cat==='grande').map(p=><option key={p.id} value={p.id}>{p.nome}</option>)}
                  </optgroup>
                  <optgroup label="Mini">
                    {ctx.sabores.filter(p=>p.cat==='mini').map(p=><option key={p.id} value={p.id}>{p.nome}</option>)}
                  </optgroup>
                  <optgroup label="Doces">
                    {ctx.sabores.filter(p=>p.cat==='doce').map(p=><option key={p.id} value={p.id}>{p.nome}</option>)}
                  </optgroup>
                </select>
                <input className="input" type="number" min="1" style={{width:56,padding:'10px 8px',textAlign:'center'}} value={item.qty} onChange={e=>updItem(idx,'qty',e.target.value)}/>
                {items.length>1&&<button onClick={()=>setItems(items.filter((_,i)=>i!==idx))} style={{background:'none',border:'none',cursor:'pointer',flexShrink:0}}>{I.x(C.red,20)}</button>}
              </div>
            ))}
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>addItem('grande')} style={{background:'#fff5f5',border:`1px solid #fca5a5`,borderRadius:10,padding:'8px 12px',fontSize:12,fontWeight:700,cursor:'pointer',color:C.red,fontFamily:'inherit'}}>+ Grande</button>
              <button onClick={()=>addItem('mini')}   style={{background:'#fffbeb',border:`1px solid #fde68a`,borderRadius:10,padding:'8px 12px',fontSize:12,fontWeight:700,cursor:'pointer',color:'#b45309',fontFamily:'inherit'}}>+ Mini</button>
              <button onClick={()=>addItem('doce')}   style={{background:'#f5f0ff',border:`1px solid #d8b4fe`,borderRadius:10,padding:'8px 12px',fontSize:12,fontWeight:700,cursor:'pointer',color:'#7e22ce',fontFamily:'inherit'}}>+ Doce</button>
            </div>
          </div>
        )}

        <label className="label">Observações</label>
        <textarea className="input" style={{marginBottom:22,height:70,resize:'none'}} placeholder="Temas, pedidos especiais..." value={notes} onChange={e=>setNotes(e.target.value)}/>

        <button className="btn-primary" onClick={save} disabled={!client||!val}>{editing?'Salvar Alterações':'Salvar Evento'}</button>
      </div>
    </div>
  );
}

// ── MODAL: ORDER DETAIL ────────────────────────────────────────────────────
function OrderDetail({ ctx, order }) {
  const [cur,setCur]=useState(order);
  if(!order)return null;
  const setStatus=s=>{
    ctx.updOrder(order.id,{status:s});
    // Espelha localmente o efeito no estoque (debita ao confirmar OU entregar,
    // repõe se voltar pra pendente/cancelado) pra refletir na UI.
    const DEBITA = ['confirmed','delivered'];
    let estoqueDebitado = cur.estoqueDebitado;
    if (DEBITA.includes(s) && !DEBITA.includes(cur.status) && !estoqueDebitado) estoqueDebitado = true;
    else if (!DEBITA.includes(s) && DEBITA.includes(cur.status) && estoqueDebitado) estoqueDebitado = false;
    setCur({...cur,status:s,estoqueDebitado});
  };
  const handlePaid=()=>{ ctx.paidOrder(order); ctx.close(); };
  const handleUnpaid=()=>{
    if (!window.confirm('Desfazer o pagamento deste pedido? O lançamento financeiro será removido e o pedido volta para "Pendente".')) return;
    ctx.unpaidOrder(order);
    setCur({...cur, paid:false, status:'pending', paidAt:null});
  };

  const CatTag=({cat})=><span style={{fontSize:10,fontWeight:700,padding:'1px 7px',borderRadius:20,
    background:cat==='grande'?'#fff5f5':cat==='mini'?'#fffbeb':'#f5f0ff',
    color:cat==='grande'?C.red:cat==='mini'?'#b45309':'#7e22ce'}}>{cat==='grande'?'Grande':cat==='mini'?'Mini':'Doce'}</span>;

  return (
    <div className="overlay" onClick={ctx.close}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
          <div style={{fontSize:19,fontWeight:800}}>Detalhes do Pedido</div>
          <button onClick={ctx.close} style={{background:'none',border:'none',cursor:'pointer'}}>{I.x('#bbb',24)}</button>
        </div>

        <div style={{background:'#faf5ee',borderRadius:16,padding:16,marginBottom:16,border:`1px solid ${C.border}`}}>
          <div style={{fontWeight:800,fontSize:16}}>{cur.client}</div>
          {cur.whatsapp&&<div style={{fontSize:13,color:C.text2,marginTop:4}}>📱 {cur.whatsapp}</div>}
          {cur.deliveryDate&&<div style={{fontSize:13,color:C.text2}}>📅 Entrega: {fmtDate(cur.deliveryDate)}</div>}
          {cur.deliveryAddress&&<div style={{fontSize:13,color:C.text2}}>📍 {cur.deliveryAddress}</div>}
        </div>

        <div style={{marginBottom:16}}>
          {cur.items.map((item,i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 0',borderBottom:`1px solid ${C.border}`}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:14}}>{item.qty}× {item.productName}</span>
                <CatTag cat={item.cat||'grande'}/>
              </div>
              <span style={{fontWeight:700,fontSize:14}}>{fmtBRL(item.qty*item.unitPrice)}</span>
            </div>
          ))}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 0 0',fontWeight:900,fontSize:17}}>
            <span>Total</span>
            <span style={{color:C.red}}>{fmtBRL(cur.total)}</span>
          </div>
        </div>

        {cur.notes&&<div style={{background:'#fffbeb',borderRadius:12,padding:12,marginBottom:16,fontSize:13,color:C.text}}>💬 {cur.notes}</div>}

        {!cur.paid&&(
          <div style={{marginBottom:16}}>
            <label className="label" style={{marginBottom:10}}>Status</label>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {['pending','confirmed','delivered','cancelled'].map(s=>(
                <button key={s} onClick={()=>setStatus(s)} style={{padding:'8px 14px',borderRadius:20,border:'none',cursor:'pointer',fontSize:13,fontWeight:700,background:cur.status===s?C.text:'#f0ebe4',color:cur.status===s?'white':C.brown,fontFamily:'inherit'}}>{S_LBL[s]}</button>
              ))}
            </div>
            {cur.estoqueDebitado && (
              <div style={{marginTop:10,display:'flex',alignItems:'center',gap:6,fontSize:12,color:C.green,fontWeight:700}}>
                {I.check(C.green,14)} Itens já separados do estoque
              </div>
            )}
          </div>
        )}

        {!cur.paid&&cur.status!=='cancelled'&&(
          <button className="btn-green" onClick={handlePaid} style={{marginBottom:10}}>
            ✓ Marcar como Pago — lançar no financeiro
          </button>
        )}
        {cur.paid&&(
          <div style={{marginBottom:10}}>
            <div style={{textAlign:'center',padding:16,background:'#f0fdf4',borderRadius:'14px 14px 0 0',color:C.green,fontWeight:800,border:`1px solid #bbf7d0`,borderBottom:'none'}}>✓ Pago e registrado no financeiro!</div>
            <button onClick={handleUnpaid} style={{width:'100%',padding:'10px 0',background:'white',border:`1px solid #bbf7d0`,borderRadius:'0 0 14px 14px',color:C.text2,fontWeight:700,fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>
              ↩ Marquei por engano — desfazer pagamento
            </button>
          </div>
        )}

        {cur.whatsapp&&(
          <a href={`https://wa.me/55${cur.whatsapp.replace(/\D/g,'')}`} target="_blank" rel="noreferrer"
            style={{display:'block',textAlign:'center',marginTop:10,padding:14,background:'#25D366',color:'white',borderRadius:14,fontWeight:800,textDecoration:'none',fontSize:15}}>
            Abrir no WhatsApp
          </a>
        )}
      </div>
    </div>
  );
}

  const setStatus=s=>{ ctx.updEvent(event.id,{status:s}); setCur({...cur,status:s}); };

  express:   { sam:0.265, gui:0.075 },
};

function getWeekRange(offset) {
  const now = new Date();
  const day = now.getDay(); // 0=Dom
  const monday = new Date(now);
  monday.setDate(now.getDate() - (day===0?6:day-1) + offset*7);
  monday.setHours(0,0,0,0);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate()+6);
  sunday.setHours(23,59,59,999);
  return { start:monday, end:sunday };
}

function fmtWeekLabel(start, end) {
  const MONTHS = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const s = `${start.getDate()} ${MONTHS[start.getMonth()]}`;
  const e = `${end.getDate()} ${MONTHS[end.getMonth()]}`;
  return `${s} – ${e}`;
}

function inWeek(dateStr, start, end) {
  if(!dateStr) return false;
  const d = new Date(dateStr+'T12:00:00');
  return d >= start && d <= end;
}

function Lucros({ ctx }) {

  const manualLive      = ctx.trans.filter(t => t.type==='entrada' && t.category==='Evento ao Vivo'   && inWeek(t.date, start, end));
  const manualExpress   = ctx.trans.filter(t => t.type==='entrada' && t.category==='Evento Express'   && inWeek(t.date, start, end));

    o.paid && inWeek(o.paidAt || o.createdAt, start, end)
  );
