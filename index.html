function RelatoriosView({ ctx }) {
  const allIn  = ctx.trans.filter(t=>t.type==='entrada').reduce((s,t)=>s+t.amount,0);
  const allOut = ctx.trans.filter(t=>t.type==='saida'  ).reduce((s,t)=>s+t.amount,0);
  const totalCaixa = ctx.openBal + allIn - allOut;

  const catRev = {};
  ctx.trans.forEach(t=>{ if(t.type==='entrada') catRev[t.category]=(catRev[t.category]||0)+t.amount; });
  const maxRev = Math.max(...Object.values(catRev), 1);

  const cancelledOrds = ctx.orders.filter(o=>o.status==='cancelled'||o.status==='cancelado');
  const activeOrds    = ctx.orders.filter(o=>o.status!=='cancelled'&&o.status!=='cancelado');
  const validOrds = activeOrds.filter(o=>o.total>0);
  const avgOrd = validOrds.length ? validOrds.reduce((s,o)=>s+o.total,0)/validOrds.length : 0;
  const delivOrd = activeOrds.filter(o=>o.status==='delivered').length;

  const validEvts = ctx.events.filter(e=>e.proposedValue>0);
  const avgEvt = validEvts.length ? validEvts.reduce((s,e)=>s+e.proposedValue,0)/validEvts.length : 0;
  const realEvts = ctx.events.filter(e=>e.status==='realizado').length;
  const liveEvts = ctx.events.filter(e=>e.type==='ao_vivo').length;
  const expEvts  = ctx.events.filter(e=>e.type==='express').length;

  const MONTHS_PT = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const months = Array.from({length:3},(_,i)=>{
    const d=new Date(); d.setMonth(d.getMonth()-2+i);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    return {
      lbl:`${MONTHS_PT[d.getMonth()]}/${String(d.getFullYear()).slice(2)}`,
      inc:ctx.trans.filter(t=>t.date.startsWith(key)&&t.type==='entrada').reduce((s,t)=>s+t.amount,0),
      out:ctx.trans.filter(t=>t.date.startsWith(key)&&t.type==='saida').reduce((s,t)=>s+t.amount,0)
    };
  });
  const maxMo = Math.max(...months.map(m=>m.inc), 1);

  const prodCnt = {};
  activeOrds.forEach(o=>{ if(o.items) o.items.forEach(i=>{ prodCnt[i.productName]=(prodCnt[i.productName]||0)+i.qty; }); });
  const topProds = Object.entries(prodCnt).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const KPI = ({lbl,val,sub,c}) => (
    <div className="card" style={{padding:'13px 12px',textAlign:'center'}}>
      <div style={{fontSize:9,color:C.text2,fontWeight:700,letterSpacing:'0.5px',marginBottom:4,textTransform:'uppercase'}}>{lbl}</div>
      <div style={{fontSize:17,fontWeight:900,color:c||C.text}}>{val}</div>
      {sub&&<div style={{fontSize:10,color:C.text2,marginTop:2,lineHeight:1.4}}>{sub}</div>}
    </div>
  );

  if(ctx.trans.length===0&&ctx.orders.length===0&&ctx.events.length===0) return (

// ── BACKUP SECTION ────────────────────────────────────────────────────────
function BackupSection({ ctx }) {
  const [importMsg, setImportMsg] = React.useState(null);

  const KEYS = ['fp_trans','fp_orders','fp_events','fp_products','fp_contas','fp_sheet_id','fp_opening_bal','fp_last_sync'];

  const exportBackup = () => {
    const data = {};
    KEYS.forEach(k => { const v = localStorage.getItem(k); if (v) data[k] = JSON.parse(v); });
    data._exportedAt = new Date().toISOString();
    data._version = 1;
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const date = new Date().toLocaleDateString('pt-BR').replace(/\//g,'-');
    a.href = url; a.download = `fino-palastro-backup-${date}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  const importBackup = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data._version) throw new Error('Arquivo inválido');
        let count = 0;
        const promises = [];
        KEYS.forEach(k => {
          if (data[k] !== undefined) {
            try { localStorage.setItem(k, JSON.stringify(data[k])); } catch {}
            try {
              const p = window.__fsdb.collection('fp_data').doc(k).set({data: data[k], ts: Date.now()});
              promises.push(p);
            } catch {}
            count++;
          }
        });
        setImportMsg({ok:true, msg:`Restaurando ${count} seções e sincronizando com a nuvem...`});
        Promise.all(promises)
          .then(() => {
            setImportMsg({ok:true, msg:`✓ Backup restaurado e sincronizado! Recarregando...`});
            setTimeout(() => window.location.reload(), 1500);
          })
          .catch(() => setTimeout(() => window.location.reload(), 1500));
      } catch(err) {
        setImportMsg({ok:false, msg:'Arquivo inválido ou corrompido. Verifique se é um backup do Fino Palastro.'});
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const forceSyncToCloud = () => {
    setImportMsg({ok:true, msg:'Sincronizando todos os dados com a nuvem...'});
    const promises = KEYS.map(k => {
      const raw = localStorage.getItem(k);
      if (!raw) return Promise.resolve();
      try {
        const v = JSON.parse(raw);
        return window.__fsdb.collection('fp_data').doc(k).set({data: v, ts: Date.now()}).catch(()=>{});
      } catch { return Promise.resolve(); }
    });
    Promise.all(promises).then(() => {
      setImportMsg({ok:true, msg:'✓ Todos os dados foram enviados para a nuvem!'});
      setTimeout(() => setImportMsg(null), 4000);
    }).catch(() => setImportMsg({ok:false, msg:'Erro ao sincronizar. Verifique sua conexão.'}));
  };

  const totalEntries = (ctx.trans?.length||0)+(ctx.orders?.length||0)+(ctx.events?.length||0)+(ctx.contas?.length||0);

  return (
    <div>
      <div style={{fontWeight:800,fontSize:15,marginBottom:4}}>&#128230; Backup dos Dados</div>
      <div style={{fontSize:12,color:C.text2,marginBottom:16,lineHeight:1.6}}>
        Salve todos os dados do sistema em um arquivo JSON.<br/>
        Use para transferir para outro computador ou como segurança.
      </div>
      <div style={{background:'#f0fdf4',borderRadius:12,padding:'10px 14px',marginBottom:14,border:'1px solid #bbf7d0',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:12,color:C.green,fontWeight:700}}>Total de registros</span>
        <span style={{fontSize:15,fontWeight:900,color:C.green}}>{totalEntries}</span>
      </div>

      <button onClick={exportBackup}
        style={{width:'100%',background:`linear-gradient(135deg,${C.green},#1e5c3a)`,border:'none',borderRadius:14,padding:15,color:'white',fontWeight:800,cursor:'pointer',fontSize:15,fontFamily:'inherit',marginBottom:10,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
        &#11015; Exportar Backup (.json)
      </button>

      <label style={{display:'block',width:'100%',background:'linear-gradient(135deg,#1d4ed8,#1e40af)',borderRadius:14,padding:15,color:'white',fontWeight:800,cursor:'pointer',fontSize:15,textAlign:'center',marginBottom:10}}>
        &#11014; Importar Backup (.json)
        <input type="file" accept=".json" onChange={importBackup} style={{display:'none'}}/>
      </label>

      <button onClick={forceSyncToCloud}
        style={{width:'100%',background:'linear-gradient(135deg,#7c3aed,#5b21b6)',border:'none',borderRadius:14,padding:15,color:'white',fontWeight:800,cursor:'pointer',fontSize:15,fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
        &#9729; Forçar Sync com Nuvem
      </button>

      {importMsg && (
        <div style={{marginTop:12,padding:'12px 14px',borderRadius:12,
          background:importMsg.ok?'#f0fdf4':'#fff5f5',
          border:`1px solid ${importMsg.ok?'#bbf7d0':'#fca5a5'}`,
          color:importMsg.ok?C.green:C.red,fontSize:13,fontWeight:700,textAlign:'center'}}>
          {importMsg.msg}
        </div>
      )}
    </div>
  );
}

// ── SETTINGS MODAL ────────────────────────────────────────────────────────
function SettingsModal({ ctx }) {
  const [localId, setLocalId] = React.useState(ctx.sheetId||'');
  const [localOB, setLocalOB] = React.useState(ctx.openBal > 0 ? String(ctx.openBal) : '');
  const close = () => ctx.setShowCfg(false);

  const handleSync = () => {
    const id = localId.trim();
    ctx.setSheetId(id);
    if(id) ctx.syncFromSheets(id);
  };

  // ── Diagnóstico de push (OneSignal) — mostra se este aparelho está de fato
  // inscrito para receber notificação mesmo com o app fechado/celular
  // bloqueado, sem precisar abrir o console do navegador.
  const [pushStatus, setPushStatus] = React.useState({ checking: true });
  const lerStatusPush = (cb) => {
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    window.OneSignalDeferred.push(function(OneSignal) {
      try {
        const sub = OneSignal.User.PushSubscription;
        cb({
          checking: false,
          permission: 'Notification' in window ? Notification.permission : 'unsupported',
          optedIn: !!sub.optedIn,
          id: sub.id || null,
        });
      } catch(e) { cb({ checking:false, error:true }); }
    });
  };
  React.useEffect(() => { lerStatusPush(setPushStatus); }, []);
  const reativarPush = () => {
    setPushStatus(p=>({...p, checking:true}));
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    window.OneSignalDeferred.push(async function(OneSignal) {
      try {
        await OneSignal.Notifications.requestPermission();
        await OneSignal.User.PushSubscription.optIn();
      } catch(e) {}
      lerStatusPush(setPushStatus);
    });
  };

  return (
    <div className="overlay" onClick={close}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div style={{fontSize:19,fontWeight:800}}>Configuracoes</div>
          <button onClick={close} style={{background:'none',border:'none',cursor:'pointer',fontSize:22,color:'#bbb'}}>x</button>
        </div>

        <div style={{background:pushStatus.optedIn?'#f0fdf4':'#fff5f5',borderRadius:16,padding:14,marginBottom:18,border:`1px solid ${pushStatus.optedIn?'#bbf7d0':'#fecaca'}`}}>
          <div style={{fontSize:13,fontWeight:800,color:pushStatus.optedIn?C.green:C.red,marginBottom:4}}>
            🔔 Notificação de novo pedido (push)
          </div>
          <div style={{fontSize:12,color:C.text2,lineHeight:1.6,marginBottom:8}}>
            {pushStatus.checking ? 'Verificando...' :
             pushStatus.error ? 'Não foi possível verificar o status do push neste aparelho.' :
             pushStatus.permission !== 'granted' ? 'Permissão de notificação não concedida no navegador/app.' :
             pushStatus.optedIn ? 'Inscrito! Deve receber notificação mesmo com o app fechado ou o celular bloqueado.' :
             'Permissão concedida, mas este aparelho ainda não está inscrito para push em segundo plano.'}
          </div>
          {!pushStatus.checking && (pushStatus.permission!=='granted' || !pushStatus.optedIn || pushStatus.error) && (
            <button onClick={reativarPush} className="btn-primary" style={{padding:'10px 16px',background:C.red,fontSize:13}}>
              Tentar ativar novamente
            </button>
          )}
        </div>

        <div style={{background:'#eff6ff',borderRadius:16,padding:14,marginBottom:18,border:'1px solid #bfdbfe'}}>
          <div style={{fontSize:13,fontWeight:800,color:'#1e40af',marginBottom:4}}>Automacao WhatsApp</div>
          <div style={{fontSize:12,color:'#1d4ed8',lineHeight:1.6}}>
            Cole o ID da planilha Google Sheets onde o Typebot salva os pedidos.
          </div>
        </div>

        <label className="label">ID da Planilha Google Sheets</label>
        <input className="input" placeholder="1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms"
          value={localId} onChange={e=>setLocalId(e.target.value)} style={{marginBottom:6}}/>
        <div style={{fontSize:11,color:C.text2,marginBottom:18,lineHeight:1.6}}>
          Encontre na URL da planilha: docs.google.com/spreadsheets/d/SEU-ID/edit
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
          <button onClick={()=>{ ctx.setSheetId(localId.trim()); close(); }}
            className="btn-primary" style={{padding:'14px 0',background:C.blue}}>
            Salvar
          </button>
          <button onClick={handleSync} disabled={!localId.trim()||ctx.syncing}
            className="btn-primary" style={{padding:'14px 0',background:!localId.trim()||ctx.syncing?'#ccc':C.green}}>
            {ctx.syncing ? 'Sync...' : 'Sincronizar'}
          </button>
        </div>

        {ctx.lastSync&&(
          <div style={{textAlign:'center',fontSize:12,color:C.text2,marginBottom:10}}>
            Ultima sync: {ctx.lastSync}
          </div>
        )}
        {ctx.syncMsg&&(
          <div style={{textAlign:'center',padding:'12px 16px',borderRadius:12,marginBottom:16,
            background:ctx.syncMsg.ok?'#f0fdf4':'#fff5f5',
            border:`1px solid ${ctx.syncMsg.ok?'#bbf7d0':'#fca5a5'}`,
            color:ctx.syncMsg.ok?C.green:C.red,fontSize:13,fontWeight:700}}>
            {ctx.syncMsg.ok
              ? `Sincronizado! ${ctx.syncMsg.no} pedido(s), ${ctx.syncMsg.ne} evento(s).`
              : `Erro: ${ctx.syncMsg.err}`}
          </div>
        )}

        <div style={{height:1,background:C.border,margin:'18px 0'}}/>

        <div style={{background:'#fffbeb',borderRadius:14,padding:'13px 14px',border:'1px solid #fde68a'}}>
          <div style={{fontWeight:800,fontSize:13,color:'#b45309',marginBottom:4}}>Saldo de Abertura do Caixa</div>

          <label className="label">Saldo Inicial (R$)</label>
          <input className="input" type="number" inputMode="decimal" placeholder="0,00"
            value={localOB} onChange={e=>setLocalOB(e.target.value)} style={{marginBottom:12}}/>
          <button onClick={()=>{ ctx.setOpenBal(parseFloat(localOB)||0); close(); }}

            Salvar Saldo de Abertura
          </button>
        </div>

        <div style={{height:1,background:C.border,margin:'20px 0'}}/>

        <BackupSection ctx={ctx}/>

        <div style={{height:1,background:C.border,margin:'20px 0'}}/>
        <UsuariosSection ctx={ctx}/>
      </div>
    </div>
  );
}

  const [novoEmail, setNovoEmail] = useState('');
  const [novaSenha, setNovaSenha] = useState('');
  const [novoNome,  setNovoNome]  = useState('');
  const [msg,       setMsg]       = useState(null); // {ok,txt}
  const [criando,   setCriando]   = useState(false);

  // carrega lista de usuários do Firestore
  useEffect(() => {
    const unsub = window.__fsdb.collection('fp_data').doc('fp_usuarios')
      .onSnapshot(doc => {
        if (doc.exists) setUsuarios(doc.data().lista || []);
        else setUsuarios([]);
      });
    return unsub;
  }, []);

  const salvarLista = async (nova) => {
    await window.__fsdb.collection('fp_data').doc('fp_usuarios').set({ lista: nova });
  };

  const criarUsuario = async () => {
    const e = novoEmail.trim().toLowerCase();
    const s = novaSenha.trim();
    const n = novoNome.trim();
    if (!e || !s || !n) { setMsg({ok:false,txt:'Preencha nome, e-mail e senha.'}); return; }
    if (s.length < 6)   { setMsg({ok:false,txt:'Senha deve ter pelo menos 6 caracteres.'}); return; }
    if (usuarios.find(u=>u.email===e)) { setMsg({ok:false,txt:'Este e-mail já está cadastrado.'}); return; }
    setCriando(true); setMsg(null);
    try {
      // Cria via app secundário para não deslogar o usuário atual
      const app2 = firebase.initializeApp(window._fbCfg, 'criacao_' + Date.now());
      try {
        await app2.auth().createUserWithEmailAndPassword(e, s);
        await app2.auth().signOut();
      } finally {
        await app2.delete();
      }
      const nova = [...usuarios, {email:e, nome:n, criadoEm: new Date().toLocaleDateString('pt-BR')}];
      await salvarLista(nova);
      setNovoEmail(''); setNovaSenha(''); setNovoNome('');
      setMsg({ok:true, txt:`Usuário "${n}" criado com sucesso!`});
    } catch(err) {
      const msgs = {
        'auth/email-already-in-use': 'Este e-mail já existe no Firebase.',
        'auth/invalid-email':        'E-mail inválido.',
        'auth/weak-password':        'Senha fraca. Use pelo menos 6 caracteres.',
      };
      setMsg({ok:false, txt: msgs[err.code] || 'Erro: ' + err.message});
    } finally { setCriando(false); }
  };

  const removerUsuario = async (email) => {
    if (email === ctx.currentUserEmail) { alert('Você não pode remover seu próprio acesso.'); return; }
    if (!window.confirm(`Remover acesso de ${email}?`)) return;
    const nova = usuarios.filter(u=>u.email!==email);
    await salvarLista(nova);
  };

  return (
    <div>
      <div style={{fontWeight:800,fontSize:15,marginBottom:4}}>👥 Usuários do Sistema</div>
      <div style={{fontSize:12,color:C.text2,marginBottom:16,lineHeight:1.5}}>
        Crie logins para pessoas de confiança. O acesso é bloqueado para qualquer um não listado aqui.
      </div>

      {/* Lista */}
      {usuarios.length===0
        ? <div style={{textAlign:'center',padding:'16px 0',color:C.text2,fontSize:13}}>Nenhum usuário além de você.</div>
        : usuarios.map(u=>(
          <div key={u.email} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
            background:u.email===ctx.currentUserEmail?'#f0fdf4':'#f9f9f7',borderRadius:12,
            padding:'10px 14px',marginBottom:8,border:`1px solid ${C.border}`}}>
            <div>
              <div style={{fontWeight:700,fontSize:13}}>{u.nome} {u.email===ctx.currentUserEmail&&<span style={{fontSize:10,color:C.green,fontWeight:700}}>(você)</span>}</div>
              <div style={{fontSize:11,color:C.text2}}>{u.email} · desde {u.criadoEm}</div>
            </div>
            {u.email!==ctx.currentUserEmail&&(
              <button onClick={()=>removerUsuario(u.email)}
                style={{background:'transparent',border:'none',cursor:'pointer',padding:6}}>
                {I.trash('#ccc',13)}
              </button>
            )}
          </div>
        ))
      }

      {/* Criar novo */}
      <div style={{background:'#f9f9f7',borderRadius:16,padding:16,border:`1px solid ${C.border}`,marginTop:12}}>
        <div style={{fontWeight:700,fontSize:13,marginBottom:12,color:C.text}}>+ Novo Usuário</div>
        <label className="label">Nome</label>
        <input className="input" placeholder="Ex: João da Silva" value={novoNome}
          onChange={e=>setNovoNome(e.target.value)} style={{marginBottom:10}}/>
        <label className="label">E-mail</label>
        <input className="input" type="email" placeholder="funcionario@email.com" value={novoEmail}
          onChange={e=>setNovoEmail(e.target.value)} style={{marginBottom:10}}/>
        <label className="label">Senha inicial</label>
        <input className="input" type="password" placeholder="Mín. 6 caracteres" value={novaSenha}
          onChange={e=>setNovaSenha(e.target.value)} style={{marginBottom:14}}/>
        {msg&&(
          <div style={{borderRadius:10,padding:'9px 12px',marginBottom:12,fontSize:13,fontWeight:600,
            background:msg.ok?'#f0fdf4':'#fff5f5',border:`1px solid ${msg.ok?'#bbf7d0':'#fca5a5'}`,
            color:msg.ok?C.green:C.red}}>
            {msg.txt}
          </div>
        )}
        <button onClick={criarUsuario} disabled={criando}
          style={{width:'100%',background:criando?'#ccc':C.red,border:'none',borderRadius:12,padding:13,
            color:'white',fontWeight:800,cursor:criando?'default':'pointer',fontFamily:'inherit',fontSize:14}}>
          {criando?'Criando...':'Criar Usuário'}
        </button>
      </div>
    </div>
  );
}

// ── CONTAS ──────────────────────────────────────────────────────────────────
function Contas({ ctx }) {
  const [tipo, setTipo] = useState('receber');
  const [showPagas, setShowPagas] = useState(false);
  const [view, setView] = useState('lista'); // 'lista' | 'calendario'
  const [buscaConta, setBuscaConta] = useState('');

  const tod = today();
  const isVencido = c => !c.pago && c.vencimento && c.vencimento < tod;
  const diasRestantes = c => {
    if (!c.vencimento) return null;
    const diff = Math.ceil((new Date(c.vencimento+'T12:00:00') - new Date(tod+'T12:00:00')) / 86400000);
    return diff;
  };

  // ── Calendário ──
  const [calRef, setCalRef] = useState(() => { const [y,m] = tod.split('-'); return {y:+y, m:+m}; }); // m: 1-12
  const [selDay, setSelDay] = useState(tod);
  const pad2 = n => String(n).padStart(2,'0');

  const contasPorDia = {};
  ctx.contas.forEach(c => {
    if (!c.vencimento || c.pago) return;
    if (!contasPorDia[c.vencimento]) contasPorDia[c.vencimento] = {pagar:[], receber:[]};
    contasPorDia[c.vencimento][c.tipo].push(c);
  });

  const diasNoMes   = new Date(calRef.y, calRef.m, 0).getDate();
  const primeiroDia = new Date(calRef.y, calRef.m-1, 1).getDay(); // 0=Dom
  const mesLabel    = new Date(calRef.y, calRef.m-1, 1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  const prevMonth   = () => setCalRef(r => r.m===1  ? {y:r.y-1,m:12} : {y:r.y,m:r.m-1});
  const nextMonth   = () => setCalRef(r => r.m===12 ? {y:r.y+1,m:1}  : {y:r.y,m:r.m+1});

  const diaSel = contasPorDia[selDay] || {pagar:[],receber:[]};
  const contasDoDia = [...diaSel.receber, ...diaSel.pagar];
  const totalDiaReceber = diaSel.receber.reduce((s,c)=>s+c.valor,0);
  const totalDiaPagar   = diaSel.pagar.reduce((s,c)=>s+c.valor,0);

  const receber = ctx.contas.filter(c => c.tipo==='receber');
  const pagar   = ctx.contas.filter(c => c.tipo==='pagar');
  const lista   = tipo==='receber' ? receber : pagar;

  const pendentes = lista.filter(c => !c.pago).sort((a,b) => {
    // Vencidos primeiro, depois por data de vencimento
    const av = isVencido(a), bv = isVencido(b);
    if (av && !bv) return -1; if (!av && bv) return 1;
    if (!a.vencimento) return 1; if (!b.vencimento) return -1;
    return a.vencimento > b.vencimento ? 1 : -1;
  });
  const pagas = lista.filter(c => c.pago).sort((a,b) => b.pagoEm>a.pagoEm?1:-1);

  const vencidos   = pendentes.filter(c => isVencido(c));
  const aVencer    = pendentes.filter(c => !isVencido(c));
  const totalPend  = pendentes.reduce((s,c)=>s+c.valor,0);
  const totalVenc  = vencidos.reduce((s,c)=>s+c.valor,0);

  // Versões filtradas pela busca (NF ou fornecedor/cliente) — usadas só na renderização da lista
  const filtrarConta = c => {
    if (!buscaConta) return true;
    const q = buscaConta.toLowerCase();
    return (c.notaFiscal||'').toLowerCase().includes(q) || (c.cliente||'').toLowerCase().includes(q);
  };
  const vencidosExib = vencidos.filter(filtrarConta);
  const aVencerExib  = aVencer.filter(filtrarConta);
  const pagasExib    = pagas.filter(filtrarConta);

  const accent = tipo==='receber' ? C.green : C.red;

  const ContaCard = ({c}) => {
    const venc = isVencido(c);
    const dias = diasRestantes(c);
    const proche = !venc && dias!==null && dias<=3 && dias>=0;
    const borderColor = venc ? '#fca5a5' : proche ? '#fde68a' : C.border;
    const bgColor = venc ? '#fff5f5' : proche ? '#fffbeb' : 'white';

    return (
      <div className="card" style={{marginBottom:10,border:`1.5px solid ${borderColor}`,background:bgColor}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div style={{flex:1,marginRight:10}}>
            <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap',marginBottom:4}}>
              <span style={{fontWeight:700,fontSize:15}}>{c.descricao}</span>
              {venc && <span className="badge" style={{background:'#fef2f2',color:'#b91c1c',fontSize:10,fontWeight:800}}>● VENCIDO</span>}
              {proche && !venc && <span className="badge" style={{background:'#fef9ee',color:'#b45309',fontSize:10,fontWeight:800}}>⚠ {dias===0?'Vence hoje':`${dias}d`}</span>}
            </div>
            {c.cliente && <div style={{fontSize:12,color:C.text2,marginBottom:4}}>{c.cliente}</div>}
            <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
              {c.categoria && <span className="badge" style={{background:'#f0f4ff',color:C.blue,fontSize:10}}>{c.categoria}</span>}
              {c.vencimento && <span className="badge" style={{background:venc?'#fef2f2':'#f5f5f5',color:venc?'#b91c1c':'#666',fontSize:10}}>
                Venc: {fmtDate(c.vencimento)}{venc&&dias!==null?` (${Math.abs(dias)}d atrás)`:''}</span>}
              {c.origemTipo && c.origemTipo!=='manual' && <span className="badge" style={{background:'#eff6ff',color:C.blue,fontSize:10}}>{c.origemTipo==='pedido'?'📦 Pedido':'🎉 Evento'}</span>}
              {c.notaFiscal && <span className="badge" style={{background:'#f0fdf4',color:C.green,fontSize:10}}>NF: {c.notaFiscal}</span>}
              {c.quantidade!=null && c.unidade && <span className="badge" style={{background:'#fdf4ff',color:'#7c3aed',fontSize:10}}>📦 {c.quantidade} {c.unidade}</span>}
            </div>
          </div>
          <div style={{textAlign:'right',flexShrink:0}}>
            <div style={{fontWeight:900,fontSize:16,color:venc?C.red:accent}}>{fmtBRL(c.valor)}</div>
            <div style={{display:'flex',gap:6,marginTop:8,justifyContent:'flex-end'}}>
              <button onClick={()=>ctx.open('pagar_conta', c)}
                style={{background:accent,border:'none',borderRadius:10,color:'white',padding:'7px 12px',fontSize:12,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:4,fontFamily:'inherit'}}>
                {I.check('white',13)} {tipo==='receber'?'Recebido':'Pago'}
              </button>
              <button onClick={()=>ctx.open('add_conta', c)}
                style={{background:'#f0ebe4',border:'none',borderRadius:10,padding:'7px 10px',cursor:'pointer',fontSize:12,fontWeight:700,fontFamily:'inherit'}}>
                Editar
              </button>
              <button onClick={()=>ctx.delConta(c.id)}
                style={{background:'transparent',border:`1px solid ${C.border}`,borderRadius:10,color:C.red,padding:'7px 10px',cursor:'pointer',display:'flex',alignItems:'center',fontFamily:'inherit'}}>
                {I.trash(C.red,13)}
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  };

  return (
    <div>
      {/* Summary hero */}
      <div style={{background:`linear-gradient(135deg,${accent},${tipo==='receber'?'#1e5c3a':'#a61e14'})`,borderRadius:22,padding:'20px',marginBottom:14,boxShadow:`0 6px 24px ${tipo==='receber'?'rgba(42,125,79,0.3)':'rgba(200,37,24,0.3)'}`}}>
        <div style={{fontSize:11,color:'rgba(255,255,255,0.7)',fontWeight:700,letterSpacing:'0.8px',marginBottom:4}}>
          {tipo==='receber' ? 'TOTAL A RECEBER' : 'TOTAL A PAGAR'}
        </div>
        <div style={{fontSize:36,fontWeight:900,color:'white',letterSpacing:'-1.5px',lineHeight:1.1,marginBottom:12}}>{fmtBRL(totalPend)}</div>
        {vencidos.length>0 && (
          <div style={{background:'rgba(255,255,255,0.18)',borderRadius:10,padding:'7px 12px',marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:12,fontWeight:700,color:'white'}}>🔴 Vencidos ({vencidos.length})</span>
            <span style={{fontSize:14,fontWeight:900,color:'#fca5a5'}}>{fmtBRL(totalVenc)}</span>
          </div>
        )}
        <div style={{display:'flex',gap:24}}>
          <div>
            <div style={{fontSize:10,color:'rgba(255,255,255,0.6)',fontWeight:700}}>EM ABERTO</div>
            <div style={{fontSize:16,fontWeight:800,color:'white'}}>{aVencer.length}</div>
          </div>
          <div>
            <div style={{fontSize:10,color:'rgba(255,255,255,0.6)',fontWeight:700}}>VENCIDOS</div>
            <div style={{fontSize:16,fontWeight:800,color:vencidos.length?'#fca5a5':'rgba(255,255,255,0.75)'}}>{vencidos.length}</div>
          </div>
          <div>
            <div style={{fontSize:10,color:'rgba(255,255,255,0.6)',fontWeight:700}}>{tipo==='receber'?'RECEBIDOS':'PAGOS'}</div>
            <div style={{fontSize:16,fontWeight:800,color:'rgba(255,255,255,0.6)'}}>{pagas.length}</div>
          </div>
        </div>
      </div>

      {/* Type chips */}
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        {[['receber','📥 A Receber'],['pagar','📤 A Pagar']].map(([k,l])=>(
          <button key={k} className="chip" onClick={()=>setTipo(k)}
            style={{background:tipo===k?(k==='receber'?C.green:C.red):'white',
              color:tipo===k?'white':C.text2,border:`1px solid ${tipo===k?(k==='receber'?C.green:C.red):C.border}`,fontSize:13,padding:'8px 18px'}}>
            {l}
          </button>
        ))}
        <button onClick={()=>ctx.open('add_conta',{tipo})}
          style={{marginLeft:'auto',background:'transparent',border:`1.5px solid ${accent}`,borderRadius:20,padding:'8px 14px',color:accent,fontWeight:700,fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',gap:4,fontFamily:'inherit'}}>
          {I.plus(accent,14)} Nova
        </button>
      </div>

      {/* View toggle */}
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        {[['lista','📋 Lista'],['calendario','📅 Calendário']].map(([k,l])=>(
          <button key={k} className="chip" onClick={()=>setView(k)}
            style={{background:view===k?C.text:'white',color:view===k?'white':C.text2,
              border:`1px solid ${view===k?C.text:C.border}`,fontSize:13,padding:'8px 16px'}}>
            {l}
          </button>
        ))}
      </div>

      {view==='calendario' && <>
        {/* Navegação do mês */}
        <div className="card" style={{marginBottom:14}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
            <button onClick={prevMonth} style={{background:'#f0ebe4',border:'none',borderRadius:10,width:32,height:32,cursor:'pointer',fontSize:15,fontFamily:'inherit'}}>‹</button>
            <div style={{fontWeight:800,fontSize:15,textTransform:'capitalize'}}>{mesLabel}</div>
            <button onClick={nextMonth} style={{background:'#f0ebe4',border:'none',borderRadius:10,width:32,height:32,cursor:'pointer',fontSize:15,fontFamily:'inherit'}}>›</button>
          </div>

          {/* Cabeçalho dos dias da semana */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4,marginBottom:6}}>
            {['D','S','T','Q','Q','S','S'].map((d,i)=>(
              <div key={i} style={{textAlign:'center',fontSize:11,fontWeight:700,color:C.text2}}>{d}</div>
            ))}
          </div>

          {/* Grade de dias */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4}}>
            {Array.from({length:primeiroDia}).map((_,i)=><div key={'b'+i}/>)}
            {Array.from({length:diasNoMes}).map((_,i)=>{
              const d = i+1;
              const dateStr = `${calRef.y}-${pad2(calRef.m)}-${pad2(d)}`;
              const info = contasPorDia[dateStr];
              const isHoje = dateStr===tod;
              const isSel  = dateStr===selDay;
              const temPagar   = info && info.pagar.length>0;
              const temReceber = info && info.receber.length>0;
              return (
                <button key={d} onClick={()=>setSelDay(dateStr)}
                  style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2,
                    aspectRatio:'1',borderRadius:10,cursor:'pointer',fontFamily:'inherit',
                    background:isSel?C.text:isHoje?'#f0ebe4':'transparent',
                    border:isHoje&&!isSel?`1.5px solid ${C.text}`:'1px solid transparent',
                    color:isSel?'white':C.text}}>
                  <span style={{fontSize:13,fontWeight:isHoje||isSel?800:500}}>{d}</span>
                  <span style={{display:'flex',gap:2,height:5}}>
                    {temReceber && <span style={{width:5,height:5,borderRadius:'50%',background:isSel?'white':C.green}}/>}
                    {temPagar && <span style={{width:5,height:5,borderRadius:'50%',background:isSel?'white':C.red}}/>}
                  </span>
                </button>
              );
            })}
          </div>
        </div>

        {/* Detalhe do dia selecionado */}
        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8}}>
          <div className="section-label" style={{marginBottom:0}}>{fmtDate(selDay)}</div>
        </div>
        {(totalDiaReceber>0 || totalDiaPagar>0) && (
          <div style={{display:'flex',gap:10,marginBottom:10}}>
            {totalDiaReceber>0 && <div style={{flex:1,background:'#f0fdf4',borderRadius:12,padding:'8px 12px'}}>
              <div style={{fontSize:10,color:C.green,fontWeight:700}}>A RECEBER</div>
              <div style={{fontSize:15,fontWeight:800,color:C.green}}>{fmtBRL(totalDiaReceber)}</div>
            </div>}
            {totalDiaPagar>0 && <div style={{flex:1,background:'#fef2f2',borderRadius:12,padding:'8px 12px'}}>
              <div style={{fontSize:10,color:C.red,fontWeight:700}}>A PAGAR</div>
              <div style={{fontSize:15,fontWeight:800,color:C.red}}>{fmtBRL(totalDiaPagar)}</div>
            </div>}
          </div>
        )}
        {contasDoDia.length===0 ? (
          <div style={{textAlign:'center',padding:'30px 0',color:C.text2,fontSize:13}}>Nenhuma conta para este dia.</div>
        ) : (
          contasDoDia.map(c=>{
            const a = c.tipo==='receber' ? C.green : C.red;
            return (
              <div key={c.id} className="card" style={{marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div style={{flex:1,marginRight:10}}>
                    <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                      <span className="badge" style={{background:c.tipo==='receber'?'#f0fdf4':'#fef2f2',color:a,fontSize:10}}>
                        {c.tipo==='receber'?'📥 A receber':'📤 A pagar'}</span>
                      {c.pago && <span className="badge" style={{background:'#f5f5f5',color:'#666',fontSize:10}}>✓ {c.tipo==='receber'?'Recebido':'Pago'}</span>}
                    </div>
                    <div style={{fontWeight:700,fontSize:15}}>{c.descricao}</div>
                    {c.cliente && <div style={{fontSize:12,color:C.text2,marginTop:2}}>{c.cliente}</div>}
                  </div>
                  <div style={{textAlign:'right',flexShrink:0}}>
                    <div style={{fontWeight:900,fontSize:16,color:a}}>{fmtBRL(c.valor)}</div>
                    {!c.pago && (
                      <div style={{display:'flex',gap:6,marginTop:8,justifyContent:'flex-end'}}>
                        <button onClick={()=>ctx.open('pagar_conta', c)}
                          style={{background:a,border:'none',borderRadius:10,color:'white',padding:'7px 12px',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>
                          {c.tipo==='receber'?'Recebido':'Pago'}
                        </button>
                        <button onClick={()=>ctx.open('add_conta', c)}
                          style={{background:'#f0ebe4',border:'none',borderRadius:10,padding:'7px 10px',cursor:'pointer',fontSize:12,fontWeight:700,fontFamily:'inherit'}}>
                          Editar
                        </button>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            );
          })
        )}
      </>}

      {view==='lista' && <>
      {/* Busca por NF ou fornecedor */}
      <input className="input" placeholder="🔍 Buscar por nota fiscal ou fornecedor/cliente..."
        value={buscaConta} onChange={e=>setBuscaConta(e.target.value)} style={{marginBottom:14}}/>

      {/* Vencidos section */}
      {vencidosExib.length>0 && <>
        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8}}>
          <div style={{width:10,height:10,borderRadius:'50%',background:'#b91c1c'}}/>
          <div className="section-label" style={{marginBottom:0,color:'#b91c1c'}}>Vencidos ({vencidosExib.length})</div>
        </div>
        {vencidosExib.map(c=><ContaCard key={c.id} c={c}/>)}
        {aVencerExib.length>0 && <div className="divider" style={{margin:'12px 0'}}/>}
      </>}

      {/* Em aberto section */}
      {aVencerExib.length>0 && <>
        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8}}>
          <div style={{width:10,height:10,borderRadius:'50%',background:accent}}/>
          <div className="section-label" style={{marginBottom:0}}>Em aberto ({aVencerExib.length})</div>
        </div>
        {aVencerExib.map(c=><ContaCard key={c.id} c={c}/>)}
      </>}

      {buscaConta && vencidosExib.length===0 && aVencerExib.length===0 && pagasExib.length===0 && (
        <div style={{textAlign:'center',padding:'28px 0',color:C.text2,fontSize:13}}>Nenhuma conta encontrada para "{buscaConta}"</div>
      )}

      {!buscaConta && pendentes.length===0 && (
        <div style={{textAlign:'center',padding:'40px 20px'}}>
          <div style={{fontSize:40,marginBottom:12}}>{tipo==='receber'?'💚':'💸'}</div>
          <div style={{fontWeight:800,fontSize:16,marginBottom:6}}>
            {tipo==='receber' ? 'Nenhuma conta a receber' : 'Nenhuma conta a pagar'}
          </div>
          <div style={{fontSize:13,color:C.text2}}>
            {tipo==='receber' ? 'Pedidos geram contas automaticamente' : 'Toque em "+ Nova" para adicionar'}
          </div>
        </div>
      )}

      {/* Pagas / recebidas */}
      {pagasExib.length>0 && <>
        <div className="divider" style={{margin:'16px 0 12px'}}/>
        <button onClick={()=>setShowPagas(p=>!p)}
          style={{background:'transparent',border:'none',cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',gap:6,marginBottom:10,padding:0}}>
          <div className="section-label" style={{color:'#aaa',marginBottom:0}}>{tipo==='receber'?'Recebidos':'Pagos'} ({pagasExib.length})</div>
          <span style={{fontSize:12,color:'#aaa'}}>{showPagas?'▲':'▼'}</span>
        </button>
        {showPagas && pagasExib.map(c=>(
          <div key={c.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',background:'#fafaf8',borderRadius:12,border:'1px solid #f0eae0',marginBottom:6,opacity:0.65}}>
            <div>
              <div style={{fontWeight:600,fontSize:14,color:C.text2,textDecoration:'line-through'}}>{c.descricao}</div>
              <div style={{display:'flex',gap:6,marginTop:3,flexWrap:'wrap'}}>
                {c.pagoEm && <span style={{fontSize:11,color:'#aaa'}}>{tipo==='receber'?'Recebido':'Pago'} em {fmtDate(c.pagoEm)}</span>}
                {c.notaFiscal && <span className="badge" style={{background:'#f0fdf4',color:'#666',fontSize:10}}>NF: {c.notaFiscal}</span>}
                {!!c.desconto && <span className="badge" style={{background:'#fff7ed',color:'#b45309',fontSize:10}}>Desconto: {fmtBRL(c.desconto)}</span>}
                {!!c.juros && <span className="badge" style={{background:'#fef2f2',color:'#b91c1c',fontSize:10}}>Juros: +{fmtBRL(c.juros)}</span>}
              </div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{textAlign:'right'}}>
                {(!!c.desconto || !!c.juros) && <div style={{fontSize:11,color:'#ccc',textDecoration:'line-through'}}>{fmtBRL(c.valor)}</div>}
                <div style={{fontWeight:700,color:'#aaa',fontSize:14}}>{fmtBRL((c.desconto||c.juros)?c.valorRecebido:c.valor)}</div>
              </div>
              <button onClick={()=>ctx.delConta(c.id)} style={{background:'transparent',border:'none',cursor:'pointer',padding:4}}>{I.trash('#ccc',13)}</button>
            </div>
          </div>
        ))}
      </>}
      </>}
    </div>
  );
}

// ── CONTA MODAL ────────────────────────────────────────────────────────────
function ContaModal({ ctx, initTipo, conta }) {
  const { close } = ctx;
  const editing = !!conta;
  const [tipo,        setTipo]        = useState(conta?.tipo || initTipo || 'receber');
  const [descricao,   setDescricao]   = useState(conta?.descricao || '');
  const [valor,       setValor]       = useState(conta?.valor ? String(conta.valor) : '');
  const [vencimento,  setVencimento]  = useState(conta?.vencimento || today());
  const [categoria,   setCategoria]   = useState(conta?.categoria || '');
  const [cliente,     setCliente]     = useState(conta?.cliente || '');
  const [notaFiscal,  setNotaFiscal]  = useState(conta?.notaFiscal || '');
  const [novaCat,     setNovaCat]     = useState('');
  const [addingCat,   setAddingCat]   = useState(false);
  const [quantidade,  setQuantidade]  = useState(conta?.quantidade!=null ? String(conta.quantidade) : '');
  const [unidade,     setUnidade]     = useState(conta?.unidade || '');
  const [novaUnidade, setNovaUnidade] = useState('');
  const [addingUn,    setAddingUn]    = useState(false);
  const [itens,       setItens]       = useState(conta?.itens && conta.itens.length ? conta.itens.map(it=>({...it})) : []);
  const [multiMode,   setMultiMode]   = useState(!!(conta?.itens && conta.itens.length));
  const [openItemIdx, setOpenItemIdx] = useState(null);

  const cats = tipo==='pagar' ? ctx.catsPagar : ctx.catsReceber;

  const toNum = v => parseFloat(String(v||'').replace(',','.')) || 0;
  const itensValidos = itens.filter(it => (it.nome||'').trim() && toNum(it.quantidade)>0 && toNum(it.valor)>0);
  const totalItens = itensValidos.reduce((s,it)=>s+toNum(it.valor),0);

  const ok = multiMode
    ? itensValidos.length>0
    : (descricao.trim() && parseFloat(valor.replace(',','.'))>0);

  const addCat = () => {
    const c = novaCat.trim();
    if (!c || cats.includes(c)) return;
    if (tipo==='pagar') ctx.setCatsPagar(p=>[...p, c]);
    else ctx.setCatsReceber(p=>[...p, c]);
    setCategoria(c);
    setNovaCat('');
    setAddingCat(false);
  };

  const removeCat = (cat) => {
    if (tipo==='pagar') {
      if (CATS_P_DEFAULT.includes(cat)) return; // não remove padrão
      ctx.setCatsPagar(p=>p.filter(c=>c!==cat));
    } else {
      if (CATS_R_DEFAULT.includes(cat)) return; // não remove padrão
      ctx.setCatsReceber(p=>p.filter(c=>c!==cat));
    }
    if (categoria===cat) setCategoria('');
  };

  const addUnidade = () => {
    const u = novaUnidade.trim().toUpperCase();
    if (!u || ctx.unidadesMedida.includes(u)) return;
    ctx.setUnidadesMedida(p=>[...p, u]);
    setUnidade(u);
    setNovaUnidade('');
    setAddingUn(false);
  };

  const removeUnidade = (u) => {
    if (UNIDADES_DEFAULT.includes(u)) return;
    ctx.setUnidadesMedida(p=>p.filter(x=>x!==u));
    if (unidade===u) setUnidade('');
  };

  // ── Múltiplas matérias-primas em uma única conta a pagar ──────────────────
  const startMulti = () => {
    const first = {
      nome: descricao.trim(),
      quantidade: quantidade || '',
      unidade: unidade || '',
      valor: valor || '',
    };
    setItens([first, { nome:'', quantidade:'', unidade:'', valor:'' }]);
    setMultiMode(true);
  };

  const cancelMulti = () => {
    const first = itens[0] || {};
    setDescricao(first.nome || '');
    setQuantidade(first.quantidade!=null ? String(first.quantidade) : '');
    setUnidade(first.unidade || '');
    setValor(first.valor!=null ? String(first.valor) : '');
    setItens([]);
    setMultiMode(false);
  };

  const addItem = () => setItens(p => [...p, { nome:'', quantidade:'', unidade:'', valor:'' }]);
  const removeItem = (idx) => setItens(p => p.filter((_,i)=>i!==idx));
  const updateItem = (idx, patch) => {
    setItens(p => p.map((it,i) => {
      if (i!==idx) return it;
      const next = {...it, ...patch};
      if (patch.nome !== undefined && !next.unidade) {
        const mp = (ctx.materiasPrimas||[]).find(m=>m.nome.toLowerCase()===patch.nome.toLowerCase());
        if (mp && mp.unidadePadrao) next.unidade = mp.unidadePadrao;
      }
      return next;
    }));
  };

  const save = () => {
    if (multiMode) {
      if (!itensValidos.length) return;
      const dados = {
        tipo,
        descricao: descricao.trim() || itensValidos.map(it=>it.nome.trim()).join(' + '),
        valor: totalItens,
        vencimento, categoria:categoria||cats[0],
        cliente:cliente.trim(), notaFiscal:notaFiscal.trim(),
        quantidade: null, unidade: null,
        itens: itensValidos.map(it => ({
          nome: it.nome.trim(), quantidade: toNum(it.quantidade), unidade: it.unidade||'', valor: toNum(it.valor),
        })),
      };
      if (editing) ctx.updConta(conta.id, dados);
      else ctx.addConta({...dados, origemTipo:'manual', pago:false, pagoEm:null});
      close();
      return;
    }
    if (!ok) return;
    const dados = {
      tipo, descricao:descricao.trim(), valor:parseFloat(valor.replace(',','.'))||0,
      vencimento, categoria:categoria||cats[0],
      cliente:cliente.trim(), notaFiscal:notaFiscal.trim(),
      quantidade: quantidade ? parseFloat(quantidade.replace(',','.')) : null,
      unidade: unidade || null,
      itens: null,
    };
    if (editing) ctx.updConta(conta.id, dados);
    else ctx.addConta({...dados, origemTipo:'manual', pago:false, pagoEm:null});
    close();
  };

  const accent = tipo==='receber' ? C.green : C.red;
  const mpNomes   = (ctx.materiasPrimas||[]).map(m=>m.nome);
  const [showMpSugg, setShowMpSugg] = useState(false);
  const [showFornSugg, setShowFornSugg] = useState(false);
  const mpFiltradas   = mpNomes.filter(n=>n.toLowerCase().includes(descricao.toLowerCase())).slice(0,8);
  // Autocomplete de fornecedor: busca por nome fantasia OU razão social
  const fornFiltrados = (ctx.fornecedores||[]).filter(f=>{
    const q = cliente.toLowerCase();
    if (!q) return true;
    return (f.nome||'').toLowerCase().includes(q)||(f.razaoSocial||'').toLowerCase().includes(q);
  }).slice(0,8);

  const onDescricaoChange = (val) => {
    setDescricao(val);
    if (tipo==='pagar') {
      const mp = (ctx.materiasPrimas||[]).find(m=>m.nome.toLowerCase()===val.toLowerCase());
      if (mp && mp.unidadePadrao) setUnidade(mp.unidadePadrao);
    }
  };

  return (
    <div className="overlay" onClick={close}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div style={{fontWeight:800,fontSize:18,marginBottom:18}}>{editing?'Editar Conta':'Nova Conta'}</div>

        {/* tipo chips */}
        <div style={{display:'flex',gap:8,marginBottom:18}}>
          {[['receber','📥 A Receber'],['pagar','📤 A Pagar']].map(([k,l])=>(
            <button key={k} className="chip" onClick={()=>{setTipo(k);setCategoria('');}}
              style={{flex:1,justifyContent:'center',background:tipo===k?(k==='receber'?C.green:C.red):'white',
                color:tipo===k?'white':C.text2,border:`1px solid ${tipo===k?(k==='receber'?C.green:C.red):C.border}`}}>
              {l}
            </button>
          ))}
        </div>

        <label className="label" style={{marginBottom:6}}>
          {multiMode ? 'Descrição da compra (opcional)' : 'Descrição *'}
          {tipo==='pagar' && !multiMode && (
            <button onClick={startMulti} style={{marginLeft:8,fontSize:11,background:'transparent',border:`1px solid ${C.border}`,borderRadius:8,padding:'2px 8px',cursor:'pointer',color:C.text2}}>+ Outra matéria-prima</button>
          )}
          {tipo==='pagar' && multiMode && (
            <button onClick={cancelMulti} style={{marginLeft:8,fontSize:11,background:'transparent',border:`1px solid ${C.border}`,borderRadius:8,padding:'2px 8px',cursor:'pointer',color:C.text2}}>Voltar a 1 item</button>
          )}
        </label>
        <div style={{position:'relative',marginBottom:14}}>
          <input className="input" placeholder={multiMode?'Ex: Compra de mussarela e calabresa - NF 123':(tipo==='receber'?'Ex: Pedido de Ana Silva':'Ex: Mozzarella, Calabresa...')}
            value={descricao} onChange={e=>multiMode?setDescricao(e.target.value):onDescricaoChange(e.target.value)}
            onFocus={()=>!multiMode&&setShowMpSugg(true)}
            onBlur={()=>setTimeout(()=>setShowMpSugg(false),150)}
            style={{marginBottom:0}}/>
          {tipo==='pagar' && !multiMode && showMpSugg && mpFiltradas.length>0 && (
            <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,right:0,background:'white',border:`1px solid ${C.border}`,borderRadius:12,boxShadow:'0 8px 20px rgba(0,0,0,0.12)',zIndex:20,maxHeight:180,overflowY:'auto'}}>
              {mpFiltradas.map((n,i)=>(
                <div key={n} onClick={()=>{onDescricaoChange(n);setShowMpSugg(false);}}
                  style={{padding:'10px 14px',fontSize:14,cursor:'pointer',borderBottom:i<mpFiltradas.length-1?`1px solid ${C.border}`:'none'}}>
                  {n}
                </div>
              ))}
            </div>
          )}
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
          <div>
            <label className="label">Valor (R$) *</label>
            {multiMode ? (
              <div className="input" style={{display:'flex',alignItems:'center',background:'#f7f7f7',color:C.text2,fontWeight:700,boxSizing:'border-box'}}>
                {fmtBRL(totalItens)}
              </div>
            ) : (
              <input className="input" type="number" inputMode="decimal" placeholder="0,00"
              value={valor} onChange={e=>setValor(e.target.value)}/>
            )}
          </div>
          <div>
            <label className="label">Vencimento</label>
            <input className="input" type="date" value={vencimento} onChange={e=>setVencimento(e.target.value)}/>
          </div>
        </div>

        {tipo==='pagar' && !multiMode && (
          <div style={{marginBottom:14}}>
            <label className="label" style={{marginBottom:6}}>Quantidade comprada
              <button onClick={()=>setAddingUn(v=>!v)} style={{marginLeft:8,fontSize:11,background:'transparent',border:`1px solid ${C.border}`,borderRadius:8,padding:'2px 8px',cursor:'pointer',color:C.text2}}>{addingUn?'Cancelar':'+ Nova unidade'}</button>
            </label>
            {addingUn&&(
              <div style={{display:'flex',gap:6,marginBottom:8}}>
                <input className="input" placeholder="Ex: FD, SC, BAG..." value={novaUnidade}
                  onChange={e=>setNovaUnidade(e.target.value.toUpperCase())}
                  onKeyDown={e=>e.key==='Enter'&&addUnidade()} style={{flex:1,marginBottom:0,textTransform:'uppercase'}}/>
                <button onClick={addUnidade} style={{background:accent,border:'none',borderRadius:10,color:'white',padding:'0 14px',fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>OK</button>
              </div>
            )}
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>
              {ctx.unidadesMedida.map(u=>(
                <div key={u} style={{display:'flex',alignItems:'center',gap:2}}>
                  <button className="chip" onClick={()=>setUnidade(u===unidade?'':u)}
                    style={{background:unidade===u?accent:'white',color:unidade===u?'white':C.text2,
                      border:`1px solid ${unidade===u?accent:C.border}`,fontSize:12,padding:'5px 12px',fontWeight:700}}>
                    {u}
                  </button>
                  {!UNIDADES_DEFAULT.includes(u)&&(
                    <button onClick={()=>removeUnidade(u)} style={{background:'transparent',border:'none',cursor:'pointer',color:'#ccc',fontSize:14,padding:'0 2px',lineHeight:1}}>×</button>
                  )}
                </div>
              ))}
            </div>
            <input className="input" type="number" inputMode="decimal" placeholder={unidade ? `Qtd em ${unidade}` : 'Selecione a unidade acima'}
              value={quantidade} onChange={e=>setQuantidade(e.target.value)} disabled={!unidade}
              style={{maxWidth:180,marginBottom:0,opacity:unidade?1:0.45}}/>
          </div>
        )}

        {tipo==='pagar' && multiMode && (
          <div style={{marginBottom:14}}>
            <label className="label" style={{marginBottom:6}}>Itens da compra</label>
            {itens.map((it,idx)=>{
              const itFiltradas = mpNomes.filter(n=>n.toLowerCase().includes((it.nome||'').toLowerCase())).slice(0,8);
              return (
                <div key={idx} style={{border:`1px solid ${C.border}`,borderRadius:12,padding:10,marginBottom:8}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                    <span style={{fontSize:11,fontWeight:700,color:C.text2}}>Item {idx+1}</span>
                    {itens.length>1 && (
                      <button onClick={()=>removeItem(idx)} style={{background:'transparent',border:'none',cursor:'pointer',color:'#ccc',fontSize:16,padding:0,lineHeight:1}}>×</button>
                    )}
                  </div>
                  <div style={{position:'relative',marginBottom:8}}>
                    <input className="input" placeholder="Matéria-prima"
                      value={it.nome} onChange={e=>updateItem(idx,{nome:e.target.value})}
                      onFocus={()=>setOpenItemIdx(idx)}
                      onBlur={()=>setTimeout(()=>setOpenItemIdx(p=>p===idx?null:p),150)}
                      style={{marginBottom:0}}/>
                    {openItemIdx===idx && itFiltradas.length>0 && (
                      <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,right:0,background:'white',border:`1px solid ${C.border}`,borderRadius:12,boxShadow:'0 8px 20px rgba(0,0,0,0.12)',zIndex:20,maxHeight:180,overflowY:'auto'}}>
                        {itFiltradas.map((n,i)=>(
                          <div key={n} onClick={()=>{updateItem(idx,{nome:n});setOpenItemIdx(null);}}
                            style={{padding:'10px 14px',fontSize:14,cursor:'pointer',borderBottom:i<itFiltradas.length-1?`1px solid ${C.border}`:'none'}}>
                            {n}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
                    <input className="input" type="number" inputMode="decimal" placeholder="Qtd"
                      value={it.quantidade} onChange={e=>updateItem(idx,{quantidade:e.target.value})} style={{marginBottom:0}}/>
                    <select className="input" value={it.unidade} onChange={e=>updateItem(idx,{unidade:e.target.value})} style={{marginBottom:0}}>
                      <option value="">Unid.</option>
                      {ctx.unidadesMedida.map(u=><option key={u} value={u}>{u}</option>)}
                    </select>
                    <input className="input" type="number" inputMode="decimal" placeholder="Valor R$"
                      value={it.valor} onChange={e=>updateItem(idx,{valor:e.target.value})} style={{marginBottom:0}}/>
                  </div>
                </div>
              );
            })}
            <button onClick={addItem} style={{background:'transparent',border:`1px dashed ${C.border}`,borderRadius:10,padding:'8px 14px',cursor:'pointer',color:C.text2,fontWeight:700,fontSize:13,width:'100%'}}>+ Adicionar item</button>
            <div style={{textAlign:'right',marginTop:8,fontSize:13,color:C.text2}}>Total: <strong>{fmtBRL(totalItens)}</strong></div>
          </div>
        )}

        <label className="label" style={{marginBottom:6}}>Categoria
          <button onClick={()=>setAddingCat(v=>!v)} style={{marginLeft:8,fontSize:11,background:'transparent',border:`1px solid ${C.border}`,borderRadius:8,padding:'2px 8px',cursor:'pointer',color:C.text2}}>{addingCat?'Cancelar':'+ Nova'}</button>
        </label>
        {addingCat&&(
          <div style={{display:'flex',gap:6,marginBottom:8}}>
            <input className="input" placeholder="Nome da categoria" value={novaCat} onChange={e=>setNovaCat(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&addCat()} style={{flex:1,marginBottom:0}}/>
            <button onClick={addCat} style={{background:accent,border:'none',borderRadius:10,color:'white',padding:'0 14px',fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>OK</button>
          </div>
        )}
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}}>
          {cats.map(c=>(
            <div key={c} style={{display:'flex',alignItems:'center',gap:2}}>
              <button className="chip" onClick={()=>setCategoria(c)}
                style={{background:categoria===c?accent:'white',color:categoria===c?'white':C.text2,
                  border:`1px solid ${categoria===c?accent:C.border}`,fontSize:12,padding:'6px 12px'}}>
                {c}
              </button>
              {!(tipo==='pagar'?CATS_P_DEFAULT:CATS_R_DEFAULT).includes(c)&&(
                <button onClick={()=>removeCat(c)} style={{background:'transparent',border:'none',cursor:'pointer',color:'#ccc',fontSize:14,padding:'0 2px',lineHeight:1}}>×</button>
              )}
            </div>
          ))}
        </div>

        <label className="label">Fornecedor / Cliente (opcional)</label>
        <div style={{position:'relative',marginBottom:14}}>
          <input className="input" placeholder="Nome ou selecione cadastrado"
            value={cliente} onChange={e=>setCliente(e.target.value)}
            onFocus={()=>setShowFornSugg(true)}
            onBlur={()=>setTimeout(()=>setShowFornSugg(false),150)}
            style={{marginBottom:0}}/>
          {showFornSugg && fornFiltrados.length>0 && (
            <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,right:0,background:'white',border:`1px solid ${C.border}`,borderRadius:12,boxShadow:'0 8px 20px rgba(0,0,0,0.12)',zIndex:20,maxHeight:180,overflowY:'auto'}}>
              {fornFiltrados.map((f,i)=>(
                <div key={f.id||f.nome} onClick={()=>{setCliente(f.nome);setShowFornSugg(false);}}
                  style={{padding:'10px 14px',cursor:'pointer',borderBottom:i<fornFiltrados.length-1?`1px solid ${C.border}`:'none'}}>
                  <div style={{fontSize:14,fontWeight:600}}>{f.nome}</div>
                  {f.razaoSocial&&<div style={{fontSize:11,color:'#9ca3af',marginTop:1}}>{f.razaoSocial}</div>}
                </div>
              ))}
            </div>
          )}
        </div>

        <label className="label">Nota Fiscal (opcional)</label>
        <input className="input" placeholder="Número da NF"
          value={notaFiscal} onChange={e=>setNotaFiscal(e.target.value)} style={{marginBottom:22}}/>

        <button onClick={save} disabled={!ok}
          style={{width:'100%',background:ok?'linear-gradient(135deg,'+accent+','+(tipo==='receber'?'#166534':'#991b1b')+')':'#e5e7eb',
            border:'none',borderRadius:14,padding:15,color:ok?'white':'#9ca3af',fontWeight:800,
            cursor:ok?'pointer':'default',fontSize:15,fontFamily:'inherit'}}>
          {editing?'Salvar Alterações':'Salvar Conta'}
        </button>
      </div>
    </div>
  );
}

// ── PAGAMENTO (com desconto) MODAL ──────────────────────────────────────────
function PagamentoModal({ ctx, conta }) {
  const { close } = ctx;
  const [desconto, setDesconto] = useState('');
  const [jurosStr, setJurosStr] = useState('');
  if (!conta) return null;

  const tipo = conta.tipo;
  const accent = tipo==='receber' ? C.green : C.red;
  const valorOriginal = conta.valor || 0;
  const descNum  = Math.min(parseFloat((desconto||'0').replace(',','.'))||0, valorOriginal);
  // Juros/multa por atraso — só faz sentido em contas a pagar (boleto pago depois
  // do vencimento). É somado por fora do valor original, nunca alterando-o: o
  // `valor` da conta continua intacto para não distorcer o custo da matéria-prima.
  const jurosNum = tipo==='pagar' ? (parseFloat((jurosStr||'0').replace(',','.'))||0) : 0;
  const valorFinal = Math.max(0, valorOriginal - descNum + jurosNum);

  const confirmar = () => {
    ctx.pagarConta(conta.id, descNum, jurosNum);
    close();
  };

  return (
    <div className="overlay" onClick={close}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div style={{fontWeight:800,fontSize:17,marginBottom:4}}>
          {tipo==='receber' ? 'Confirmar Recebimento' : 'Confirmar Pagamento'}
        </div>
        <div style={{fontSize:13,color:C.text2,marginBottom:16}}>{conta.descricao}</div>

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:'#f9f7f3',borderRadius:12,padding:'12px 14px',marginBottom:16}}>
          <span style={{fontSize:13,color:C.text2,fontWeight:600}}>Valor original</span>
          <span style={{fontSize:16,fontWeight:800}}>{fmtBRL(valorOriginal)}</span>
        </div>

        <label className="label">Desconto concedido (opcional)</label>
        <input className="input" type="number" inputMode="decimal" placeholder="Ex: 10,00"
          value={desconto} onChange={e=>setDesconto(e.target.value)} style={{marginBottom:16}}/>

        {tipo==='pagar' && <>
          <label className="label">Juros / multa por atraso (opcional)</label>
          <input className="input" type="number" inputMode="decimal" placeholder="Ex: 15,00"
            value={jurosStr} onChange={e=>setJurosStr(e.target.value)} style={{marginBottom:4}}/>
          <div style={{fontSize:11,color:C.text2,marginBottom:16}}>
            Some ao valor pago, sem alterar o valor original da conta — não entra no cálculo de custo da matéria-prima.
          </div>
        </>}

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:'#fafaf8',border:`1px solid ${C.border}`,borderRadius:12,padding:'12px 14px',marginBottom:20}}>
          <span style={{fontSize:13,fontWeight:700}}>{tipo==='receber'?'Valor recebido':'Valor pago'}</span>
          <span style={{fontSize:18,fontWeight:900,color:accent}}>{fmtBRL(valorFinal)}</span>
        </div>

        <button onClick={confirmar}
          style={{width:'100%',background:`linear-gradient(135deg,${accent},${tipo==='receber'?'#166534':'#991b1b'})`,
            border:'none',borderRadius:14,padding:15,color:'white',fontWeight:800,
            cursor:'pointer',fontSize:15,fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
          {I.check('white',15)} Confirmar {tipo==='receber'?'Recebimento':'Pagamento'}
        </button>
      </div>
    </div>
  );
}

const MP_CATS_DEFAULT = ['Queijos','Frios e Carnes','Embalagem','Molhos e Temperos','Massas','Outros'];

  const [busca,     setBusca]     = useState('');

  const salvar = () => {
    const nome = mpNome.trim();
    if (!nome) return;
    const precoManual = parseFloat(String(mpPreco).replace(',','.'))||0;
    if (mpEdit) {
      ctx.updMateriaPrima(mpEdit.id, {nome, unidadePadrao: mpUnidade, categoria: mpCat, precoManual});
      setMpEdit(null);
    } else {
      ctx.addMateriaPrima({nome, unidadePadrao: mpUnidade, categoria: mpCat, precoManual});
    }
    setMpNome(''); setMpUnidade(''); setMpCat(''); setMpPreco('');
  };

  const iniciarEdicao = (m) => {
    setMpEdit(m); setMpNome(m.nome); setMpUnidade(m.unidadePadrao||''); setMpCat(m.categoria||'');
    setMpPreco(m.precoManual>0 ? String(m.precoManual).replace('.',',') : '');
    // O formulário fica no topo da aba — rola a tela até ele para o usuário ver
    // que os campos foram preenchidos com os dados da matéria-prima clicada.
    try { window.scrollTo({top:0, behavior:'smooth'}); } catch(e){}
  };

  // Para relatório: agrupa contas a pagar por nome de MP
  const comprasPorMP = (mpNome) => {
    return ctx.contas.filter(c =>
      c.tipo === 'pagar' &&
      c.descricao && c.descricao.toLowerCase().includes(mpNome.toLowerCase())
    ).sort((a,b) => (b.vencimento||'') > (a.vencimento||'') ? 1 : -1);
  };

  const lista = ctx.materiasPrimas.filter(m =>
    !busca || m.nome.toLowerCase().includes(busca.toLowerCase()) ||
    (m.categoria||'').toLowerCase().includes(busca.toLowerCase())
  );

  // Agrupa por categoria para exibição
  const porCat = lista.reduce((acc, m) => {
    const cat = m.categoria || 'Sem categoria';
    if (!acc[cat]) acc[cat] = [];
    acc[cat].push(m);
    return acc;
  }, {});

  return (
    <div>
      {/* Formulário */}
      <div className="card" style={{marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:15,marginBottom:12}}>{mpEdit?'Editar Matéria Prima':'Nova Matéria Prima'}</div>
        <label className="label">Nome *</label>
        <input className="input" placeholder="Ex: Mozzarella, Calabresa, Caixa Pizza..." value={mpNome}
          onChange={e=>setMpNome(e.target.value)} style={{marginBottom:10}}/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
          <div>
            <label className="label">Unidade padrão</label>
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:4}}>
              {ctx.unidadesMedida.slice(0,6).map(u=>(
                <button key={u} className="chip" onClick={()=>setMpUnidade(u===mpUnidade?'':u)}
                  style={{background:mpUnidade===u?C.red:'white',color:mpUnidade===u?'white':C.text2,
                    border:`1px solid ${mpUnidade===u?C.red:C.border}`,fontSize:11,padding:'4px 10px',fontWeight:700}}>
                  {u}
                </button>
              ))}
            </div>
          </div>
          <div>
            <label className="label">Categoria</label>
            <select className="input" value={mpCat} onChange={e=>setMpCat(e.target.value)} style={{padding:'9px 12px'}}>
              <option value="">Selecione...</option>
              {MP_CATS_DEFAULT.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
        </div>
        <label className="label">Preço por {mpUnidade||'unidade'} (opcional)</label>
        <input className="input" type="number" inputMode="decimal" placeholder="0,00" value={mpPreco}
          onChange={e=>setMpPreco(e.target.value)} style={{marginBottom:4}}/>
        <div style={{fontSize:11,color:C.text2,marginBottom:10}}>

        </div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={salvar} disabled={!mpNome.trim()}

              color:mpNome.trim()?'white':'#9ca3af',fontWeight:700,cursor:mpNome.trim()?'pointer':'default',fontFamily:'inherit'}}>
            {mpEdit?'Salvar':'Cadastrar'}
          </button>
          {mpEdit&&<button onClick={()=>{setMpEdit(null);setMpNome('');setMpUnidade('');setMpCat('');setMpPreco('');}}
            style={{background:'#f0ebe4',border:'none',borderRadius:12,padding:'12px 16px',cursor:'pointer',fontFamily:'inherit'}}>
            Cancelar
          </button>}
        </div>
      </div>

      {/* Busca */}
      {ctx.materiasPrimas.length > 0 && (
        <input className="input" placeholder="🔍 Buscar matéria prima ou categoria..."
          value={busca} onChange={e=>setBusca(e.target.value)} style={{marginBottom:14}}/>
      )}

      {/* Consulta rápida: último valor pago + último fornecedor, lado a lado,

      {lista.length > 0 && (

          <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>📋 Última compra por matéria-prima</div>
          {lista.slice().sort((a,b)=>a.nome.localeCompare(b.nome)).map(m=>{
            const ultimo = ultimoPrecoMP(ctx.contas, m);
            return (
              <div key={m.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:10,
                padding:'9px 0',borderBottom:`1px solid ${C.border}`}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:13,color:C.text,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{m.nome}</div>
                  {ultimo && !ultimo.manual && <div style={{fontSize:10.5,color:C.text2,marginTop:1}}>{fmtDate(ultimo.data)}</div>}
                </div>
                <div style={{textAlign:'right',minWidth:78,flexShrink:0}}>
                  <div style={{fontWeight:800,fontSize:13,color:'#b45309'}}>
                    {ultimo ? `${fmtBRL(ultimo.custoExibicao)}/${ultimo.unidadeBase}` : '—'}
                  </div>
                </div>
                <div style={{textAlign:'right',minWidth:110,maxWidth:130,flexShrink:0}}>
                  <div style={{fontWeight:700,fontSize:12,color:ultimo&&!ultimo.manual?C.text:C.text2,
                    whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                    {ultimo ? (ultimo.manual ? 'Preço manual' : (ultimo.fornecedor||'—')) : '—'}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Lista por categoria */}
      {ctx.materiasPrimas.length===0 && (
        <div style={{textAlign:'center',padding:'32px 0',color:C.text2,fontSize:13}}>Nenhuma matéria prima cadastrada ainda.</div>
      )}

      {Object.entries(porCat).map(([cat, itens])=>(
        <div key={cat} style={{marginBottom:16}}>
          <div className="section-label" style={{marginBottom:6}}>{cat}</div>
          {itens.map(m=>{
            const compras = comprasPorMP(m.nome);
            const totalGasto = compras.reduce((s,c)=>s+(c.valor||0),0);
            const totalQtd   = compras.reduce((s,c)=>s+(c.quantidade||0),0);
            const isOpen     = detalhe===m.id;
            const ultimo     = ultimoPrecoMP(ctx.contas, m);
            return (
              <div key={m.id} style={{marginBottom:8,background:'white',borderRadius:14,
                border:`1px solid ${C.border}`,overflow:'hidden'}}>
                {/* Linha principal */}
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 14px',cursor:'pointer'}}
                  onClick={()=>setDetalhe(isOpen?null:m.id)}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:14,color:C.text}}>{m.nome}</div>

function Estoque({ ctx }) {
  const [subTab, setSubTab] = useState('estoque'); // 'estoque'|'mp'|'fornecedores'|'clientes'|'historico'
  const [ajuste, setAjuste] = useState(null); // { nome, cat } da pizza selecionada
  const [ajQtd,  setAjQtd]  = useState('');
  const [ajTipo, setAjTipo] = useState('entrada');
  const [ajMotivo, setAjMotivo] = useState('');
  // fornecedor form
  const [fNome,       setFNome]       = useState(''); // Nome Fantasia
  const [fRazaoSocial,setFRazaoSocial]= useState('');
  const [fContato,    setFContato]    = useState('');
  const [fTipo,       setFTipo]       = useState('fornecedor');
  const [fEdit,       setFEdit]       = useState(null);
  const [fBusca,      setFBusca]      = useState('');
  // form de cliente (criar/editar)
  const [cNome,    setCNome]    = useState('');
  const [cWhats,   setCWhats]   = useState('');
  const [cEndereco,setCEndereco]= useState('');
  const [cObs,     setCObs]     = useState('');
  const [cEdit,    setCEdit]    = useState(null);
  // form de sabor (criar/editar) — null = fechado, {} = novo, objeto = editando
  const [saborForm, setSaborForm] = useState(null);
  const [sfNome, setSfNome] = useState('');
  const [sfCat,  setSfCat]  = useState('grande');
  const [sfPreco,setSfPreco]= useState('');
  const [sfDesc, setSfDesc] = useState('');
  const [sfReceita, setSfReceita] = useState([]); // [{materiaPrimaId, quantidade, unidade}]

  const abrirNovoSabor = (cat) => { setSaborForm({}); setSfNome(''); setSfCat(cat); setSfPreco(''); setSfDesc(''); setSfReceita([]); };
  const abrirEditarSabor = (s) => { setSaborForm(s); setSfNome(s.nome); setSfCat(s.cat); setSfPreco(String(s.preco||'')); setSfDesc(s.desc||''); setSfReceita(s.receita||[]); };
  const addItemReceita = () => setSfReceita(p=>[...p,{materiaPrimaId:'',quantidade:'',unidade:''}]);
  const updItemReceita = (idx,k,v) => setSfReceita(p=>p.map((it,i)=>{
    if (i!==idx) return it;
    if (k==='materiaPrimaId') {
      const mp = ctx.materiasPrimas.find(m=>m.id===v);
      return { ...it, materiaPrimaId:v, unidade: mp ? (mp.unidadePadrao||it.unidade) : it.unidade };
    }
    return { ...it, [k]:v };
  }));
  const rmItemReceita = idx => setSfReceita(p=>p.filter((_,i)=>i!==idx));
  const salvarSabor = () => {
    const nome = sfNome.trim();
    const preco = parseFloat(sfPreco);
    if (!nome || !preco) return;
    const receita = sfReceita.filter(it=>it.materiaPrimaId && it.quantidade).map(it=>({...it,quantidade:parseFloat(it.quantidade)||0}));
    const dados = { nome, cat:sfCat, preco, desc:sfDesc.trim(), receita };
    if (saborForm && saborForm.id) ctx.updSabor(saborForm.id, dados);
    else ctx.addSabor(dados);
    setSaborForm(null);
  };
  const excluirSabor = () => {
    if (saborForm && saborForm.id && window.confirm('Excluir este sabor? Ele deixará de aparecer no cardápio de pedidos.')) {
      ctx.delSabor(saborForm.id);
      setSaborForm(null);
    }
  };

  const salvarAjuste = () => {
    const qtd = parseInt(ajQtd);
    if (!ajuste||!qtd||!ajMotivo.trim()) return;
    const delta = ajTipo==='entrada' ? qtd : -qtd;
    ctx.ajustarEstoque(ajuste.nome, delta, ajMotivo.trim(), ajTipo);
    setAjuste(null); setAjQtd(''); setAjMotivo('');
  };

  const salvarForn = () => {
    const nome = fNome.trim(); // nome = Nome Fantasia (campo principal)
    if (!nome) return;
    const dados = {nome, razaoSocial:fRazaoSocial.trim(), contato:fContato.trim(), tipo:fTipo};
    if (fEdit) {
      ctx.updFornecedor(fEdit.id, dados);
      setFEdit(null);
    } else {
      ctx.addFornecedor(dados);
    }
    setFNome(''); setFRazaoSocial(''); setFContato(''); setFTipo('fornecedor');
  };

  const salvarCliente = () => {
    const nome = cNome.trim();
    if (!nome) return;
    if (cEdit) {
      ctx.updCliente(cEdit.id, {nome, whatsapp:cWhats.trim(), endereco:cEndereco.trim(), obs:cObs.trim()});
      setCEdit(null);
    } else {
      ctx.addCliente({nome, whatsapp:cWhats.trim(), endereco:cEndereco.trim(), obs:cObs.trim()});
    }
    setCNome(''); setCWhats(''); setCEndereco(''); setCObs('');
  };

  const grandes = ctx.sabores.filter(p=>p.cat==='grande');
  const minis   = ctx.sabores.filter(p=>p.cat==='mini');
  const doces   = ctx.sabores.filter(p=>p.cat==='doce');

  const StockRow = ({p}) => {
    const qtd = ctx.estoqueData[p.nome];
    const semControle = qtd === undefined || qtd === null;
    const negativo = !semControle && qtd < 0;
    const zerado = !semControle && qtd === 0;
    const alerta = zerado || negativo;
    const cmv = cmvSabor(ctx.contas, ctx.materiasPrimas, p);
    const temReceita = Array.isArray(p.receita) && p.receita.length>0;
    return (
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
          padding:'12px 14px',background:alerta?'#fef2f2':'white',borderRadius:12,
          marginBottom:6,border:`1px solid ${alerta?'#fecaca':C.border}`}}>
        <div onClick={()=>{setAjuste(p);setAjQtd('');setAjMotivo('');setAjTipo('entrada');}} style={{flex:1,cursor:'pointer'}}>
          <div style={{fontWeight:600,fontSize:14,color:alerta?C.red:C.text}}>{p.nome}</div>
          <div style={{display:'flex',gap:6,alignItems:'center',marginTop:2,flexWrap:'wrap'}}>
            <span style={{fontSize:11,color:C.text2}}>{fmtBRL(p.preco||0)}</span>
            {temReceita&&<span className="badge" style={{background:'#fff7ed',color:'#b45309',fontSize:10,fontWeight:700}}>CMV {fmtBRL(cmv)} ({p.preco?Math.round(cmv/p.preco*100):0}%)</span>}
          </div>

          {negativo&&<div style={{fontSize:11,color:C.red,marginTop:2}}>⚠️ Estoque negativo — faltam {Math.abs(qtd)} un. para repor</div>}
          {semControle&&<div style={{fontSize:11,color:C.text2,marginTop:2}}>Sem controle definido</div>}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div onClick={()=>{setAjuste(p);setAjQtd('');setAjMotivo('');setAjTipo('entrada');}} style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
            <div style={{fontWeight:900,fontSize:18,color:alerta?C.red:semControle?C.text2:C.green,minWidth:36,textAlign:'right'}}>

            <div style={{fontSize:11,color:C.text2}}>un</div>

          <button onClick={()=>abrirEditarSabor(p)}

      </div>

              {I.plus(C.red,12)} Novo
            </button>
          </div>
          {doces.map(p=><StockRow key={p.id} p={p}/>)}

            if(!fBusca) return true;
            const q=fBusca.toLowerCase();

          }).map(f=>{
            const tel = (f.contato||'').replace(/\D/g,'');
            const waLink = tel.length>=10 ? 'https://wa.me/55'+tel : null;
            return (
              <div key={f.id} className="card" style={{marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div style={{flex:1,minWidth:0}}>

                  {f.razaoSocial&&<div style={{fontSize:11,color:C.text2,marginTop:1}}>{f.razaoSocial}</div>}

                          WhatsApp
                        </a>
                      )}
                    </div>

                  <span className="badge" style={{marginTop:4,background:'#f0f4ff',color:C.blue,fontSize:10}}>{f.tipo==='mp'?'Matéria Prima':f.tipo==='ambos'?'Forn. + MP':'Fornecedor'}</span>
                </div>
                <div style={{display:'flex',gap:6,marginLeft:8}}>
                  <button onClick={()=>{setFEdit(f);setFNome(f.nome);setFRazaoSocial(f.razaoSocial||'');setFContato(f.contato||'');setFTipo(f.tipo||'fornecedor');}}
                    style={{background:'#f0ebe4',border:'none',borderRadius:10,padding:'6px 12px',cursor:'pointer',fontSize:12,fontFamily:'inherit'}}>Editar</button>
                  <button onClick={()=>ctx.delFornecedor(f.id)}
                    style={{background:'transparent',border:'none',cursor:'pointer',padding:6}}>{I.trash('#ccc',13)}</button>
                </div>
              </div>
            );
          })}
        </div>

      {subTab==='clientes'&&(

            <label className="label">WhatsApp</label>

            <input className="input" placeholder="Rua, número, bairro" value={cEndereco} onChange={e=>setCEndereco(e.target.value)} style={{marginBottom:10}}/>
